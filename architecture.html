<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Architecture</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap' rel='stylesheet'>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #4a90e2;
            --green: #4caf50;
            --orange: #ff9800;
            --red: #f44336;
            --purple: #ab47bc;
            --cyan: #00bcd4;
            --border: #444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            position: relative;
        }

        h1 { font-size: 2.2rem; }
        .subtitle { color: #888; margin-top: 8px; font-size: 0.95rem; }

        .home-btn {
            position: absolute; top: 20px; right: 24px;
            padding: 6px 16px; background: #e0e0e0; color: #333;
            text-decoration: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
        }

        h2 {
            font-size: 1.5rem;
            color: var(--accent-color);
            margin: 40px 0 20px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent-color);
        }

        h3 {
            font-size: 1.15rem;
            color: #ccc;
            margin: 24px 0 12px 0;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        nav a {
            color: var(--accent-color);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid var(--accent-color);
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        nav a:hover {
            background: var(--accent-color);
            color: #fff;
        }

        /* Flow Section */
        .flow-container { display: flex; flex-direction: column; gap: 30px; }

        .flow-group {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border-left: 4px solid var(--accent-color);
        }
        .flow-group.trigger-manual { border-left-color: var(--green); }
        .flow-group.trigger-schedule { border-left-color: var(--orange); }
        .flow-group.trigger-github { border-left-color: var(--purple); }

        .flow-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }

        .flow-badge {
            padding: 4px 12px; border-radius: 12px;
            font-size: 0.8rem; font-weight: bold; color: #fff;
        }
        .badge-manual { background: var(--green); }
        .badge-schedule { background: var(--orange); }
        .badge-github { background: var(--purple); }

        .flow-title { font-size: 1.2rem; font-weight: bold; }
        .flow-desc { color: #aaa; font-size: 0.9rem; margin-bottom: 16px; }

        /* Steps */
        .steps { display: flex; flex-wrap: wrap; gap: 0; align-items: center; }

        .step {
            background: #383838; border: 1px solid var(--border); border-radius: 8px;
            padding: 12px 16px; min-width: 160px; text-align: center;
        }
        .step-number { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .step-file { font-family: 'Consolas', 'Courier New', monospace; font-size: 0.85rem; color: var(--cyan); margin: 4px 0; word-break: break-all; }
        .step-desc { font-size: 0.8rem; color: #aaa; }

        .arrow { font-size: 1.4rem; color: #666; padding: 0 8px; flex-shrink: 0; }

        .step-output {
            background: #2a3a2a; border: 1px solid var(--green); border-radius: 8px;
            padding: 12px 16px; min-width: 140px; text-align: center;
        }
        .step-output .step-file { color: var(--green); }

        /* File Table */
        .file-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .file-table th { background: #383838; padding: 12px 16px; text-align: left; font-size: 0.85rem; color: var(--accent-color); border-bottom: 2px solid var(--border); }
        .file-table td { padding: 10px 16px; border-bottom: 1px solid #333; font-size: 0.85rem; }
        .file-table tr:hover { background: #333; }
        .file-name { font-family: 'Consolas', 'Courier New', monospace; color: var(--cyan); }

        .tag {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 0.7rem; font-weight: bold; color: #fff; margin: 1px 2px;
        }
        .tag-vm { background: #2e7d32; }
        .tag-github { background: #7b1fa2; }
        .tag-command { background: #1565c0; }
        .tag-schedule { background: #e65100; }
        .tag-local { background: #555; }

        /* Data & Infra Cards */
        .data-grid, .infra-grid, .cmd-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px; margin-top: 12px;
        }

        .data-card, .infra-card, .cmd-card {
            background: var(--card-bg); border-radius: 8px;
            padding: 16px; border: 1px solid var(--border);
        }
        .data-card-title { font-family: 'Consolas', 'Courier New', monospace; color: var(--cyan); font-size: 0.95rem; margin-bottom: 8px; }
        .data-card-desc { font-size: 0.85rem; color: #aaa; }

        .infra-card { text-align: center; padding: 20px; }
        .infra-icon { font-size: 2rem; margin-bottom: 8px; }
        .infra-title { font-weight: bold; margin-bottom: 6px; }
        .infra-desc { font-size: 0.85rem; color: #aaa; text-align: left; }

        .cmd-name { font-family: 'Consolas', 'Courier New', monospace; font-size: 1.1rem; color: var(--green); margin-bottom: 6px; }
        .cmd-desc { font-size: 0.85rem; color: #aaa; }
        .cmd-flow { margin-top: 10px; padding-top: 10px; border-top: 1px solid #444; font-size: 0.8rem; color: #888; }
        .cmd-flow code { color: var(--cyan); background: #383838; padding: 1px 5px; border-radius: 3px; font-size: 0.8rem; }

        /* Debug Table */
        .debug-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .debug-table th { background: #383838; padding: 10px 14px; text-align: left; font-size: 0.85rem; color: var(--orange); border-bottom: 2px solid var(--border); }
        .debug-table td { padding: 10px 14px; border-bottom: 1px solid #333; font-size: 0.85rem; vertical-align: top; }
        .debug-table code { color: var(--cyan); background: #383838; padding: 1px 5px; border-radius: 3px; font-size: 0.8rem; }

        /* Migration Section */
        .migration-card {
            background: var(--card-bg); border-radius: 12px; padding: 24px;
            border: 1px solid var(--border); margin-bottom: 16px;
        }
        .migration-card h4 { color: var(--accent-color); margin-bottom: 12px; font-size: 1.05rem; }
        .migration-card ul { padding-left: 20px; color: #aaa; font-size: 0.85rem; }
        .migration-card li { margin-bottom: 6px; }
        .migration-card code { color: var(--cyan); background: #383838; padding: 1px 5px; border-radius: 3px; font-size: 0.8rem; }

        footer {
            text-align: center; margin-top: 60px; padding: 20px;
            color: #555; font-size: 0.85rem; border-top: 1px solid #333;
        }
        footer a { color: var(--accent-color); text-decoration: none; }

        /* Password */
        .pw-overlay { position: fixed; inset: 0; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .pw-box { background: var(--card-bg); border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-width: 320px; width: 90%; }
        .pw-box h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--text-color); }
        .pw-box input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; text-align: center; outline: none; background: #383838; color: var(--text-color); }
        .pw-box input:focus { border-color: var(--accent-color); }
        .pw-hidden { display: none; }

        @media (max-width: 768px) {
            .steps { flex-direction: column; }
            .arrow { transform: rotate(90deg); padding: 4px 0; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="pw-overlay" id="pwOverlay">
    <div class="pw-box">
        <h2>Architecture</h2>
        <input type="password" id="pwInput" placeholder="Password" autofocus
               onkeyup="if(event.key==='Enter'){checkPw(this.value);}">
        <div id="pwWarn" style="margin-top:12px;font-size:0.8rem;color:#f44336;display:none;"></div>
    </div>
</div>
<script>
var _pwFail = 0;
async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(v) {
    const hash = await sha256(v);
    if (hash === '97b2df85b9cd4686f08a7b81d835c10bbfe5b4e16af9b668f2c161e4fbca99f5') {
        document.getElementById('pwOverlay').style.display='none';
        var tpl = document.getElementById('contentTemplate');
        document.getElementById('mainContent').innerHTML = tpl.content ? tpl.content.cloneNode(true).querySelector('div').outerHTML : tpl.innerHTML;
        document.getElementById('mainContent').style.display='block';
    } else {
        _pwFail++;
        var inp = document.getElementById('pwInput');
        var warn = document.getElementById('pwWarn');
        inp.style.borderColor='#f44336'; inp.value='';
        warn.style.display='block';
        if (_pwFail < 3) {
            warn.textContent = '\u26A0 ' + (3 - _pwFail) + '\uD68C \uCD94\uAC00 \uC2E4\uD328 \uC2DC \uD654\uBA74\uC774 \uC7A0\uAE41\uB2C8\uB2E4.';
        } else {
            warn.textContent = '\uD83D\uDD12 \uBCF4\uC548 \uC815\uCC45\uC5D0 \uC758\uD574 \uD654\uBA74\uC774 \uC7A0\uACBC\uC2B5\uB2C8\uB2E4. \uAD00\uB9AC\uC790\uC5D0\uAC8C \uBB38\uC758\uD558\uC138\uC694.';
            inp.disabled = true;
            inp.placeholder = 'Locked';
            setTimeout(function(){ inp.disabled = false; inp.placeholder = 'Password'; warn.style.display = 'none'; _pwFail = 0; }, 60000);
        }
    }
}
</script>

        <li><strong>한글 폰트:</strong> draw_charts.py에서 matplotlib 한글 폰트 필요. <code>sudo apt install fonts-nanum</code> 또는 Mac: <code>brew install font-nanum-gothic</code></li>
        <li><strong>Git 인증:</strong> <code>git remote set-url origin https://USERNAME:TOKEN@github.com/...</code></li>
        <li><strong>타임존:</strong> 서버 TZ=Asia/Seoul 설정. <code>sudo timedatectl set-timezone Asia/Seoul</code></li>
        <li><strong>research_notes.db:</strong> VM에서 scp로 복사 필요 (Git에 포함 안 됨)</li>
        <li><strong>subscribers.json:</strong> VM에서 복사 필요</li>
        <li><strong>media/ 디렉토리:</strong> 리서치봇 이미지 파일. scp로 이전</li>
        <li><strong>Wrap_NAV.xlsx 충돌:</strong> .gitattributes에 <code>Wrap_NAV.xlsx -merge</code> 설정 유지</li>
        <li><strong>GHA 비활성화:</strong> 사설 서버로 완전 이전 시 daily_crawl.yml의 schedule 주석 처리 (중복 실행 방지)</li>
    </ul>
