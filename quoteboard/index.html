<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #fff; color: #111;
    font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif;
  }
  /* AoE 공통 topnav — 대시보드 생성 페이지(create_dashboard)와 동일 CSS 원문 + 개인 뷰(aoe-personal-nav) */
  .topnav { background: #101418; border-bottom: 2px solid #2d7a3a; position: sticky; top: 0; z-index: 100; }
  .topnav-inner { max-width: 1400px; margin: 0 auto; padding: 0 28px; box-sizing: border-box; display: flex; align-items: stretch; height: 54px; gap: 36px; }
  .topnav-brand { font-size: 1.1rem; font-weight: 800; letter-spacing: 3.5px; color: #fff; white-space: nowrap; text-decoration: none; align-self: center; font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif; }
  .topnav-brand:hover { color: #7fc78f; }
  .topnav-tabs { display: flex; gap: 2px; flex: 1; align-items: stretch; }
  .topnav-item { position: relative; display: flex; align-items: stretch; }
  .topnav-tab { box-sizing: border-box; display: inline-flex; align-items: center; gap: 6px; padding: 0 18px; color: #fff; text-decoration: none; font-size: 0.92rem; font-weight: 600; letter-spacing: 0.3px; border: none; border-radius: 0; white-space: nowrap; background: transparent; transition: color 0.12s, background 0.12s; cursor: pointer; font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif; }
  .topnav-tab:hover { color: #fff; background: #1a2027; }
  .topnav-tab.active { color: #fff; background: #991B1B; font-weight: 700; }
  .topnav-tab .caret { font-size: 0.7rem; opacity: 0.7; }
  .topnav-dropdown { box-sizing: border-box; position: absolute; top: 100%; left: 0; min-width: 180px; width: max-content; background: #14181d; border: 1px solid #2a323b; border-radius: 0; box-shadow: 0 8px 24px rgba(0,0,0,0.35); padding: 4px 0; opacity: 0; visibility: hidden; transform: translateY(-4px); transition: opacity 0.15s, transform 0.15s, visibility 0.15s; z-index: 200; }
  .topnav-item:hover .topnav-dropdown,
  .topnav-item:focus-within .topnav-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
  .topnav-sub { display: block; padding: 9px 16px; color: #b7c0c9; text-decoration: none; font-size: 0.9rem; font-weight: 500; border-radius: 0; white-space: nowrap; text-align: center; font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif; }
  .topnav-sub:hover { background: #1a2027; color: #fff; }
  .topnav-sub.active { background: #2a1515; color: #e08585; font-weight: 700; }
  @media (max-width: 800px) {
    .topnav-inner { padding: 0 12px; gap: 12px; height: 46px; }
    .topnav-brand { font-size: 0.95rem; }
    .topnav-tab { padding: 0 12px; font-size: 0.85rem; }
    .topnav-tabs { display: flex; gap: 2px; flex: 1; align-items: stretch; }
  }
  .topnav-tabs .topnav-item.sisyphe-item { margin-left: auto; }
  .topnav-tab.sisyphe-tab { background: transparent; border: none; color: #d9c48f; }
  .topnav-tab.sisyphe-tab:hover { background: #1a2027; border: none; color: #f3e8cf; }
  .topbar {
    position: sticky; top: var(--nav-h, 72px); z-index: 20; background: #fff;
    border-bottom: 1px solid #e5e5e5; padding: 8px 16px 0;
  }
  .titlerow { display: flex; align-items: baseline; gap: 14px; }
  .titlerow h1 { font-size: 15px; font-weight: 700; margin: 0 0 6px; }
  .titlerow .meta { font-size: 12px; color: #888; }
  .titlerow #q {
    margin-left: auto; font-family: inherit; font-size: 12.5px; color: #111;
    border: 1px solid #d1d5db; border-radius: 14px; padding: 4px 12px; width: 190px;
    outline: none; background: #fafafa;
  }
  .titlerow #q:focus { background: #fff; border-color: #2d7a3a; }
  .tabs { display: flex; flex-wrap: wrap; gap: 4px; padding-bottom: 6px; }   /* 섹터 탭 줄바꿈(2줄) */
  .tab {
    flex: 0 0 auto; padding: 4px 12px; font-size: 12.5px; cursor: pointer;
    border: 1px solid #ddd; border-radius: 14px; background: #fff; color: #555;
    white-space: nowrap; user-select: none;
  }
  .tab.active { background: #111; color: #fff; border-color: #111; }
  .content { display: flex; gap: 24px; padding: 10px 16px 20vh; align-items: flex-start; flex-wrap: wrap; }   /* 하단 여백 — 마지막 섹터 열람 편의 */
  .panel { flex: 1 1 560px; min-width: 500px; max-width: 880px; }
  .panel h2 {
    font-size: 13px; font-weight: 700; margin: 4px 0 6px;
    padding: 5px 10px; background: #f4f6f8; border-radius: 6px;
  }
  .panel h2 .cnt { font-weight: 400; color: #888; margin-left: 6px; font-size: 11.5px; }
  .panel h2 .gname { outline: none; border-radius: 3px; padding: 0 2px; }
  .panel h2 .gname:focus { background: #fff; box-shadow: 0 0 0 1px #bbb; }
  .panel h2 .gadd { cursor: pointer; color: #2d7a3a; font-weight: 700; margin-left: 8px; padding: 0 4px; border-radius: 4px; }
  .panel h2 .gadd:hover { background: #e6f0e8; }
  .empty { color: #aaa; font-size: 12.5px; padding: 8px 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    position: sticky; top: var(--thead-top, 74px); z-index: 5; background: #fafafa;
    font-weight: 600; color: #555; padding: 6px 8px;
    border-bottom: 1px solid #ddd; text-align: center; white-space: nowrap;
    cursor: pointer; user-select: none;
  }
  thead th.star, thead th.name, thead th.codeh { cursor: default; }
  thead th .arw { font-size: 10px; color: #111; margin-left: 2px; }
  td { padding: 4px 8px; border-bottom: 1px solid #f2f2f2; text-align: center; white-space: nowrap; font-variant-numeric: tabular-nums; }
  td.code { color: #aaa; }
  td.name { max-width: 168px; overflow: hidden; text-overflow: ellipsis; }   /* 긴 ETF명 말줄임 (전체 이름=툴팁) */
  td.star, th.star { width: 26px; padding: 4px 2px 4px 8px; text-align: center; }
  td.star { cursor: pointer; color: #ccc; font-size: 13px; }
  td.star.on { color: #f5a623; }
  td.star .gno { font-size: 9px; vertical-align: super; color: #b98510; }
  .up { color: #d13d3d; }
  .down { color: #1261c4; }
  .flat { color: #555; }
  tbody tr:hover td { background: #fcfcf5; }
  #starmenu {
    position: absolute; z-index: 50; background: #fff; border: 1px solid #ccc;
    border-radius: 8px; box-shadow: 0 4px 14px rgba(0,0,0,.12); padding: 4px;
    display: none; min-width: 150px;
  }
  #starmenu .mi {
    padding: 5px 10px; font-size: 12.5px; cursor: pointer; border-radius: 5px;
    display: flex; justify-content: space-between; gap: 10px;
  }
  #starmenu .mi:hover { background: #f4f6f8; }
  #starmenu .mi .chk { color: #f5a623; }
  #addmenu {
    position: absolute; z-index: 50; background: #fff; border: 1px solid #ccc;
    border-radius: 8px; box-shadow: 0 4px 14px rgba(0,0,0,.12); padding: 6px;
    display: none; width: 230px;
  }
  #addmenu #addq {
    width: 100%; font-family: inherit; font-size: 12.5px; padding: 5px 8px;
    border: 1px solid #d1d5db; border-radius: 6px; outline: none; margin-bottom: 4px;
  }
  #addmenu .mi {
    padding: 5px 8px; font-size: 12.5px; cursor: pointer; border-radius: 5px;
    display: flex; justify-content: space-between; gap: 10px;
  }
  #addmenu .mi:hover { background: #f4f6f8; }
</style>

<script>
const COLS = [
  ['price', '현재가'], ['chg', '등락률'], ['trdval', '거래대금'], ['mcap', '시가총액'],
];
const WL_KEY = 'quoteboard_watchlists_v1';
const VIEW_KEY = 'quoteboard_view_v1';
let DATA = null;
let sortKey = 'mcap', sortDir = -1;

function loadView() {
  try {
    // 2026-07-18: 진입 첫 화면은 항상 관심종목(wl) — 저장된 mode 무시, 섹터 선택(secs)만 승계
    const v = JSON.parse(localStorage.getItem(VIEW_KEY));
    if (v && v.mode) {
      if (v.sortKey) { sortKey = v.sortKey; sortDir = v.sortDir || -1; }
      return { mode: 'wl', secs: v.secs || [] };
    }
  } catch (e) {}
  return { mode: 'wl', secs: [] };   // mode: 'wl' | 'all' | 'sectors', secs=클릭 순서
}
let VIEW = loadView();
// 뷰 설정(섹터 선택·정렬) = 서버 저장(/prefs 병합, 기기 공통) + localStorage는 즉시표시 캐시 (2026-07-20)
const saveView = () => {
  const v = { mode: VIEW.mode, secs: VIEW.secs, sortKey, sortDir };
  try { localStorage.setItem(VIEW_KEY, JSON.stringify(v)); } catch (e) {}
  fetch('prefs', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({ [VIEW_KEY]: v }) }).catch(() => {});
};
fetch('prefs').then(r => r.ok ? r.json() : null).then(p => {
  const v = p && p[VIEW_KEY];
  if (!v) return;
  VIEW.secs = v.secs || [];
  if (v.sortKey) { sortKey = v.sortKey; sortDir = v.sortDir || -1; }
  try { localStorage.setItem(VIEW_KEY, JSON.stringify(v)); } catch (e) {}
  if (DATA) render();
}).catch(() => {});
let menuCode = null;               // 팝오버 대상 종목
// 그룹명 편집 중 여부는 activeElement로 판정 (포커스 이벤트 미발화 환경 대비)
const isEditingName = () =>
  document.activeElement && document.activeElement.classList &&
  document.activeElement.classList.contains('gname');

// 관심종목 그룹 = 서버 저장(기기 공통). 탭 선택/정렬은 브라우저별(localStorage) 유지.
let WL = [{ name: '관심종목 1', codes: [] },
          { name: '관심종목 2', codes: [] },
          { name: '관심종목 3', codes: [] }];
let wlTimer = null;
function saveWL() {                // 400ms 디바운스 후 서버 POST
  clearTimeout(wlTimer);
  wlTimer = setTimeout(() => {
    fetch('wl', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(WL) }).catch(() => {});
  }, 400);
}
async function loadWLServer() {
  try {
    const w = await fetch('wl').then(r => r.json());
    if (Array.isArray(w) && w.length === 3) {
      // 1회 마이그레이션: 서버가 비어있고 이 브라우저(localStorage)에 담긴 게 있으면 승계
      let local = null;
      try { local = JSON.parse(localStorage.getItem(WL_KEY)); } catch (e) {}
      if (w.every(g => !g.codes.length) && local && local.some(g => g.codes && g.codes.length)) {
        WL = local;
        saveWL();
      } else {
        WL = w;
      }
      render();
    }
  } catch (e) {}
}
loadWLServer();
const memberOf = code => WL.map((g, i) => g.codes.includes(code) ? i : -1).filter(i => i >= 0);

const comma = n => Math.round(n).toLocaleString('ko-KR');
function fmtEok(won) {             // 원 → 억원 (1조 이상 = NN조 N,NNN억)
  if (!won) return '-';
  const eok = won / 1e8;
  if (eok >= 10000) {
    const jo = Math.floor(eok / 10000);
    const rest = Math.round(eok - jo * 10000);
    return rest ? `${comma(jo)}조 ${comma(rest)}억` : `${comma(jo)}조`;
  }
  return comma(eok) + '억';
}
function fmtChg(c) {
  const s = (c > 0 ? '+' : '') + c.toFixed(1) + '%';
  return `<span class="${c > 0 ? 'up' : c < 0 ? 'down' : 'flat'}">${s}</span>`;
}

function sectorGroups(rows) {      // 섹터 목록 (합산 시총 내림차순)
  const g = new Map();
  for (const r of rows) {
    if (!g.has(r.sector)) g.set(r.sector, []);
    g.get(r.sector).push(r);
  }
  const arr = [...g.entries()]
    .map(([sec, rs]) => ({ sec, rows: rs, sum: rs.reduce((a, r) => a + r.mcap, 0) }))
    .sort((a, b) => b.sum - a.sum);
  const ei = arr.findIndex(x => x.sec === 'ETF');   // ETF 그룹은 항상 맨 앞
  if (ei > 0) arr.unshift(arr.splice(ei, 1)[0]);
  return arr;
}

function tabsHTML(groups) {        // [관심종목, 전체] + 개별 섹터 (토글 멀티선택)
  let h = `<div class="tab${VIEW.mode === 'wl' ? ' active' : ''}" data-kind="wl" title="관심종목">★</div>` +
          `<div class="tab${VIEW.mode === 'all' ? ' active' : ''}" data-kind="all">전체</div>`;
  for (const g of groups) {
    const on = VIEW.mode === 'sectors' && VIEW.secs.includes(g.sec);
    h += `<div class="tab${on ? ' active' : ''}" data-kind="sec" data-sec="${g.sec}">${g.sec}</div>`;
  }
  return h;
}

function theadHTML() {
  let h = '<thead><tr><th class="star">★</th><th class="name">종목</th><th class="codeh">코드</th>';
  for (const [key, label] of COLS) {
    const arw = key === sortKey ? `<span class="arw">${sortDir < 0 ? '▼' : '▲'}</span>` : '';
    h += `<th data-key="${key}">${label}${arw}</th>`;
  }
  return h + '</tr></thead>';
}

function rowHTML(r) {
  const mem = memberOf(r.code);
  const star = mem.length
    ? `★<span class="gno">${mem.map(i => i + 1).join(',')}</span>`
    : '☆';
  return `<tr><td class="star${mem.length ? ' on' : ''}" data-code="${r.code}">${star}</td>` +
         `<td class="name" title="${r.name}">${r.name}</td><td class="code">${r.code}</td>` +
         `<td>${comma(r.price)}</td><td>${fmtChg(r.chg)}</td>` +
         `<td>${fmtEok(r.trdval)}</td><td>${fmtEok(r.mcap)}</td></tr>`;
}

function tableHTML(rows) {
  const sorted = [...rows].sort((a, b) => (a[sortKey] - b[sortKey]) * sortDir);
  return `<table>${theadHTML()}<tbody>${sorted.map(rowHTML).join('')}</tbody></table>`;
}

function sectorPanelHTML(sec, rows) {
  return `<div class="panel"><h2>${sec}<span class="cnt">${rows.length}</span></h2>${tableHTML(rows)}</div>`;
}

function wlPanelHTML(g, gi, byCode) {
  const rows = g.codes.map(c => byCode.get(c)).filter(Boolean);
  const body = rows.length
    ? tableHTML(rows)
    : '<div class="empty">비어 있음 — 종목 행의 ☆을 눌러 추가</div>';
  return `<div class="panel"><h2>` +
         `<span class="gname" contenteditable="true" spellcheck="false" data-gi="${gi}">${g.name}</span>` +
         `<span class="cnt">${rows.length}</span>` +
         `<span class="gadd" data-gi="${gi}" title="종목 추가">＋</span></h2>${body}</div>`;
}

function render() {
  if (!DATA || isEditingName() || menuCode !== null || addGi !== null) return;
  const groups = sectorGroups(DATA.rows);
  document.getElementById('tabs').innerHTML = tabsHTML(groups);

  const q = document.getElementById('q').value.trim().toLowerCase();
  let html;
  if (q) {                            // 전역 검색 — 모든 탭에서 우선 표시
    const rows = DATA.rows.filter(r => r.name.toLowerCase().includes(q) || r.code.toLowerCase().startsWith(q));
    rows.sort((a, b) => b.mcap - a.mcap);
    html = `<div class="panel"><h2>검색 결과<span class="cnt">${rows.length}</span></h2>` +
           (rows.length ? tableHTML(rows) : '<div class="empty">결과 없음</div>') + '</div>';
  } else if (VIEW.mode === 'wl') {
    const byCode = new Map(DATA.rows.map(r => [r.code, r]));
    html = WL.map((g, gi) => wlPanelHTML(g, gi, byCode)).join('');
  } else if (VIEW.mode === 'all') {
    html = groups.map(g => sectorPanelHTML(g.sec, g.rows)).join('');
  } else {
    const byName = new Map(groups.map(g => [g.sec, g]));
    const shown = VIEW.secs.map(s => byName.get(s)).filter(Boolean);   // 클릭 순서 유지
    html = shown.length
      ? shown.map(g => sectorPanelHTML(g.sec, g.rows)).join('')
      : '<div class="empty">위 섹터 탭을 눌러 화면에 추가</div>';
  }
  document.getElementById('content').innerHTML = html;

  const m = DATA.meta;
  document.getElementById('meta').textContent =
    `${m.sweep_at || '-'}` + (m.fail ? ` · 수신 실패 ${m.fail}건` : '');
  const navH = document.querySelector('nav.topnav').offsetHeight;
  document.documentElement.style.setProperty('--nav-h', navH + 'px');
  document.documentElement.style.setProperty('--thead-top',
    navH + document.getElementById('topbar').offsetHeight + 'px');
}

// ── 탭 전환 (섹터: 일반 클릭=단독 표시, Ctrl/Shift/Cmd+클릭=추가·제거, 클릭 순서대로 패널 표시) ──
document.getElementById('tabs').addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if (!t) return;
  if (t.dataset.kind === 'sec') {
    const multi = e.ctrlKey || e.metaKey || e.shiftKey;
    if (VIEW.mode !== 'sectors') VIEW.mode = 'sectors';
    if (multi) {
      const i = VIEW.secs.indexOf(t.dataset.sec);
      if (i >= 0) VIEW.secs.splice(i, 1); else VIEW.secs.push(t.dataset.sec);
    } else {
      VIEW.secs = [t.dataset.sec];
    }
  } else {
    VIEW.mode = t.dataset.kind;    // 'wl' | 'all'
  }
  saveView();
  window.scrollTo(0, 0);
  closeMenu();
  render();
});

// ── 정렬 + 별표 팝오버 + 그룹 종목 추가(+) ──
document.getElementById('content').addEventListener('click', e => {
  const ga = e.target.closest('.gadd');
  if (ga) { openAdd(ga, +ga.dataset.gi); return; }
  const star = e.target.closest('td.star');
  if (star) { openMenu(star, star.dataset.code); return; }
  const th = e.target.closest('th[data-key]');
  if (!th) return;
  const key = th.dataset.key;
  if (key === sortKey) sortDir = -sortDir;
  else { sortKey = key; sortDir = -1; }
  saveView();
  render();
});

// ── 전역 검색 ──
document.getElementById('q').addEventListener('input', () => render());

// ── 그룹 종목 추가 팝오버 ──
let addGi = null;
const addmenu = document.getElementById('addmenu');
function openAdd(anchor, gi) {
  addGi = gi;
  const rc = anchor.getBoundingClientRect();
  addmenu.style.left = (rc.left + window.scrollX) + 'px';
  addmenu.style.top = (rc.bottom + window.scrollY + 2) + 'px';
  addmenu.style.display = 'block';
  const aq = document.getElementById('addq');
  aq.value = '';
  renderAddResults('');
  aq.focus();
}
function closeAdd() { addGi = null; addmenu.style.display = 'none'; }
function renderAddResults(aq) {
  if (!DATA || addGi === null) return;
  aq = aq.trim().toLowerCase();
  const inGroup = new Set(WL[addGi].codes);
  let rows = DATA.rows.filter(r => !inGroup.has(r.code));
  if (aq) rows = rows.filter(r => r.name.toLowerCase().includes(aq) || r.code.toLowerCase().startsWith(aq));
  rows.sort((a, b) => b.mcap - a.mcap);
  document.getElementById('addres').innerHTML = rows.slice(0, 8).map(r =>
    `<div class="mi" data-code="${r.code}"><span>${r.name}</span>` +
    `<span style="color:#aaa;font-size:11px;">${r.code}</span></div>`).join('') ||
    '<div class="mi" style="color:#aaa;cursor:default;">결과 없음</div>';
}
document.getElementById('addq').addEventListener('input', e => renderAddResults(e.target.value));
document.getElementById('addres').addEventListener('click', e => {
  const mi = e.target.closest('.mi');
  if (!mi || !mi.dataset.code || addGi === null) return;
  WL[addGi].codes.push(mi.dataset.code);
  saveWL();
  renderAddResults(document.getElementById('addq').value);   // 연속 추가 가능하게 열어둠
});

const menu = document.getElementById('starmenu');
function openMenu(anchor, code) {
  menuCode = code;
  menu.innerHTML = WL.map((g, i) => {
    const on = g.codes.includes(code);
    return `<div class="mi" data-gi="${i}"><span>${g.name}</span><span class="chk">${on ? '★' : ''}</span></div>`;
  }).join('');
  const rc = anchor.getBoundingClientRect();
  menu.style.left = (rc.left + window.scrollX) + 'px';
  menu.style.top = (rc.bottom + window.scrollY + 2) + 'px';
  menu.style.display = 'block';
}
function closeMenu() { menuCode = null; menu.style.display = 'none'; }
menu.addEventListener('click', e => {
  const mi = e.target.closest('.mi');
  if (!mi || menuCode === null) return;
  const g = WL[+mi.dataset.gi];
  const idx = g.codes.indexOf(menuCode);
  if (idx >= 0) g.codes.splice(idx, 1); else g.codes.push(menuCode);
  saveWL();
  const code = menuCode; closeMenu(); menuCode = null;
  render();
});
document.addEventListener('click', e => {
  if (menuCode !== null && !e.target.closest('#starmenu') && !e.target.closest('td.star')) {
    closeMenu(); render();
  }
  if (addGi !== null && !e.target.closest('#addmenu') && !e.target.closest('.gadd')) {
    closeAdd(); render();
  }
});

// ── 그룹명 편집 (input 즉시 저장 — 포커스 이벤트 의존 제거) ──
function saveName(el) {
  const gi = +el.dataset.gi;
  const name = el.textContent.trim().slice(0, 40);   // 서버 검증 한도
  if (Number.isInteger(gi) && WL[gi] && name) { WL[gi].name = name; saveWL(); }
}
document.getElementById('content').addEventListener('input', e => {
  if (e.target.classList.contains('gname')) saveName(e.target);
});
document.getElementById('content').addEventListener('focusout', e => {
  if (e.target.classList.contains('gname')) {
    saveName(e.target);
    render();
  }
});
document.getElementById('content').addEventListener('keydown', e => {
  if (e.target.classList.contains('gname') && e.key === 'Enter') {
    e.preventDefault();
    e.target.blur();
    render();
  }
});

async function tick() {
  try {
    const res = await fetch('data');   // 상대경로 — /watchlist/ 프록시·로컬 직서빙 겸용
    DATA = await res.json();
    render();
  } catch (e) {
    document.getElementById('meta').textContent = '서버 연결 끊김';
  }
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
