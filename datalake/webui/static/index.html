  header { padding: 14px 20px; background: #14171b; border-bottom: 1px solid #27282b;

  header span { font-weight: 400; color: #8a919a; font-size: 13px; margin-left: 8px; }

  #send { padding: 0 22px; border: none; border-radius: 10px; background: #1a56db; color: #14171b;

<body>
<nav class="topnav"><div class="topnav-inner"><a href="/index.html" class="topnav-brand">AGE OF EMERGENCE</a><div class="topnav-tabs"><div class="topnav-item"><a href="/watchlist/" class="topnav-tab">Watchlist</a></div><div class="topnav-item"><a href="/market.html" class="topnav-tab">Market</a><div class="topnav-dropdown"><a href="/market.html" class="topnav-sub">Data</a><a href="/taiwan.html" class="topnav-sub">Taiwan</a><a href="/universe.html" class="topnav-sub">Universe</a><a href="/universe_lab.html" class="topnav-sub">Universe Lab</a><a href="/featured.html" class="topnav-sub">Featured</a><a href="/market_alert.html" class="topnav-sub">투자유의종목</a><a href="/etf.html" class="topnav-sub">ETF</a><a href="/seibro.html" class="topnav-sub">SEIBro</a></div></div><div class="topnav-item"><a href="/sisyphe/journal.html" class="topnav-tab">Journal</a></div><div class="topnav-item"><a href="/sisyphe/journal.html#weekly" class="topnav-tab">Weekly</a></div><div class="topnav-item"><a href="/sisyphe/memento.html" class="topnav-tab">Memento</a></div><div class="topnav-item"><a href="/sisyphe/dashboard.html" class="topnav-tab">Ledger</a></div><div class="topnav-item" style="margin-left:auto"><a href="/wiki/" class="topnav-tab active">Wiki</a></div><div class="topnav-item"><a href="/architecture.html" class="topnav-tab">Architecture</a></div></div></div></nav>
<div id="chat"></div>
<footer>
  <form id="form">
    <textarea id="q" rows="1"></textarea>
    <button id="send" type="submit">질문</button>
  </form>
</footer>
<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const q = document.getElementById('q');
const send = document.getElementById('send');
const history = [];

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 최소 markdown 렌더러 (외부 의존 없음): 표·볼드·코드·헤딩·리스트
function md(src) {
  const lines = esc(src).split('\n');
  let html = '', inCode = false, inTable = false, inList = false;
  const flush = () => { if (inTable) { html += '</table>'; inTable = false; }
                        if (inList) { html += '</ul>'; inList = false; } };
  for (let line of lines) {
    if (line.startsWith('```')) { flush(); html += inCode ? '</pre>' : '<pre>'; inCode = !inCode; continue; }
    if (inCode) { html += line + '\n'; continue; }
    let t = line.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
                .replace(/`([^`]+)`/g, '<code>$1</code>');
    if (/^\|.*\|\s*$/.test(line)) {
      if (/^\|[\s:|-]+\|\s*$/.test(line)) continue;
      if (!inTable) { flush(); html += '<table>'; inTable = true; }
      const cells = t.replace(/^\||\|\s*$/g, '').split('|');
      const tag = html.endsWith('<table>') ? 'th' : 'td';
      html += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      continue;
    }
    if (/^#{2,3}\s/.test(line)) { flush(); html += `<h3>${t.replace(/^#{2,3}\s/, '')}</h3>`; continue; }
    if (/^[-*]\s/.test(line)) { if (!inList) { flush(); html += '<ul>'; inList = true; }
                                html += `<li>${t.replace(/^[-*]\s/, '')}</li>`; continue; }
    flush();
    html += t + '<br>';
  }
  flush();
  if (inCode) html += '</pre>';
  return html;
}

function add(role, content, stepsInfo) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const inner = role === 'user' ? esc(content) : md(content);
  let steps = '';
  if (stepsInfo && stepsInfo.length)
    steps = `<div class="steps">${stepsInfo.map(s => '🔧 ' + s.tool).join(' · ')}</div>`;
  div.innerHTML = `<div class="bubble">${inner}${steps}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = q.value.trim();
  if (!question) return;
  q.value = '';
  add('user', question);
  send.disabled = true;
  const wait = add('bot', '');
  wait.querySelector('.bubble').innerHTML = '<span class="thinking">데이터 조회 중... (수십 초 걸릴 수 있습니다)</span>';
  try {
    const res = await fetch('ask', {  // 상대경로 — /wiki/ 프록시 하위에서도 동작 (2026-07-12)
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question, history})
    });
    const data = await res.json();
    wait.remove();
    add('bot', data.answer, data.steps);
    history.push({role: 'user', content: question});
    history.push({role: 'assistant', content: data.answer});
  } catch (err) {
    wait.remove();
    add('bot', '오류: ' + err.message);
  }
  send.disabled = false;
  q.focus();
});

q.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
</script>
</body>
