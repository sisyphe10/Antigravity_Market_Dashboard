function fmtDate(el) {
    var v = el.value;
    if (/^\d{8}$/.test(v)) { el.value = v.slice(0,4)+'-'+v.slice(4,6)+'-'+v.slice(6,8); return true; }
    return /^\d{4}-\d{2}-\d{2}$/.test(v);
}
function tryRefresh() {
    var a = document.getElementById('fStartDate');
    var b = document.getElementById('fEndDate');
    if (fmtDate(a) && fmtDate(b)) refresh();
}

function fmtVal(v) {
    if (v >= 1e12) {
        var jo = Math.floor(v / 1e12);
        var eok = Math.round((v % 1e12) / 1e8);
        return jo.toLocaleString() + '조 ' + eok.toLocaleString() + '억';
    }
    if (v >= 1e8) return Math.round(v / 1e8).toLocaleString() + '억';
    return Math.round(v).toLocaleString();
}

function refresh() {
    var s = document.getElementById('fStartDate').value;
    var e = document.getElementById('fEndDate').value;
    var isSingle = (s === e);
    var filtered = raw.filter(function(r) { return r.d >= s && r.d <= e; });

    // 기간 내 거래대금 합산으로 순위 재계산
    var absAgg = {};
    var turnAgg = {};
    filtered.forEach(function(r) {
        var key = r.name;
        if (r.type === 'absolute') {
            if (!absAgg[key]) absAgg[key] = {name: r.name, market: r.market, trdval: 0, mktcap: r.mktcap, chgSum: 0, cnt: 0};
            absAgg[key].trdval += r.trdval;
            absAgg[key].mktcap = r.mktcap;
            absAgg[key].chgSum += r.chg;
            absAgg[key].cnt++;
        }
        if (r.type === 'turnover') {
            if (!turnAgg[key]) turnAgg[key] = {name: r.name, market: r.market, trdval: 0, mktcap: r.mktcap, turnover: 0, chgSum: 0, cnt: 0};
            turnAgg[key].trdval += r.trdval;
            turnAgg[key].mktcap = r.mktcap;
            turnAgg[key].turnover += r.turnover;
            turnAgg[key].chgSum += r.chg;
            turnAgg[key].cnt++;
        }
    });

    var absList = Object.values(absAgg).sort(function(a,b) { return b.trdval - a.trdval; }).slice(0, 30);
    var turnList = Object.values(turnAgg).sort(function(a,b) { return b.turnover - a.turnover; }).slice(0, 30);

    // 날짜 수
    var dateSet = {};
    filtered.forEach(function(r) { dateSet[r.d] = 1; });
    var nDays = Object.keys(dateSet).length;
    document.getElementById('dateLabel').textContent = isSingle ? '' : nDays + '거래일 합산';

    var h1 = '';
    absList.forEach(function(r, i) {
        var avgChg = r.cnt > 0 ? (r.chgSum / r.cnt) : 0;
        var cls = avgChg > 0 ? 'pos' : (avgChg < 0 ? 'neg' : '');
        var chgLabel = (avgChg > 0 ? '+' : '') + Math.round(avgChg) + '%';
        h1 += '<tr><td class="c">' + (i+1) + '</td><td class="c">' + r.name + '</td><td class="c">' + r.market + '</td><td class="c">' + fmtVal(r.trdval) + '</td><td class="c">' + fmtVal(r.mktcap) + '</td><td class="c ' + cls + '">' + chgLabel + '</td></tr>';
    });
    document.getElementById('absTable').innerHTML = h1 || '<tr><td colspan="6" style="text-align:center;padding:40px;color:#888;">데이터 없음</td></tr>';

    var h2 = '';
    turnList.forEach(function(r, i) {
        var avgChg = r.cnt > 0 ? (r.chgSum / r.cnt) : 0;
        var cls = avgChg > 0 ? 'pos' : (avgChg < 0 ? 'neg' : '');
        var chgLabel = (avgChg > 0 ? '+' : '') + Math.round(avgChg) + '%';
        var avgTurnover = r.cnt > 0 ? (r.turnover / r.cnt) : 0;
        h2 += '<tr><td class="c">' + (i+1) + '</td><td class="c">' + r.name + '</td><td class="c">' + r.market + '</td><td class="c">' + fmtVal(r.trdval) + '</td><td class="c">' + Math.round(avgTurnover) + '%</td><td class="c">' + fmtVal(r.mktcap) + '</td><td class="c ' + cls + '">' + chgLabel + '</td></tr>';
    });
    document.getElementById('turnTable').innerHTML = h2 || '<tr><td colspan="7" style="text-align:center;padding:40px;color:#888;">데이터 없음</td></tr>';
}
refresh();
