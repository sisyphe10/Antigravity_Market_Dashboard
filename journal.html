<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal</title>
    <link href='https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap' rel='stylesheet'>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #f8f9fa; color: #333; }

        /* Password */
        .pw-overlay { position: fixed; inset: 0; background: #f8f9fa; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .pw-box { background: #fff; border-radius:0; padding: 40px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.1); max-width: 320px; width: 90%; }
        .pw-box h2 { font-size: 1.2rem; margin-bottom: 20px; }
        .pw-box input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius:0; font-size: 1rem; text-align: center; outline: none; }
        .pw-box input:focus { border-color: #333; }
        .pw-hidden { display: none; }

        /* Layout */
        header { background: #fff; padding: 20px 24px; border-bottom: 1px solid #eee; position: relative; text-align: center; }
        header h1 { font-size: 1.6rem; font-weight: 800; color: #222; }
        .content { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* Timeline */
        .timeline { position: relative; padding-left: 32px; }
        .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: #ddd; }
        .tl-entry { position: relative; margin-bottom: 32px; }
        .tl-dot { position: absolute; left: -27px; top: 8px; width: 12px; height: 12px; border-radius: 50%; background: #333; border: 2px solid #fff; box-shadow: 0 0 0 2px #333; }
        .tl-date { font-size: 0.85rem; font-weight: 800; color: #000; margin-bottom: 8px; }
        .tl-card { background: #fff; min-height: 470px; display: flex; flex-direction: column; border-radius:0; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #c8e6c9; }

        /* Market data grid */
        .market-grid { display: grid; grid-template-columns: 2fr 5fr; gap: 0; margin-bottom: 0; flex: 1; align-items: stretch; }
        .market-col h3 { font-size: 0.9rem; font-weight: 700; color: #fff; background: #333; padding: 6px 10px; border-radius:0; margin-bottom: 0; text-align: center; }
        .market-col.kospi h3 { }
        .market-col.kosdaq h3 { }
        
        .market-col { padding: 0; }
        .market-row { display: flex; padding-left: 8px; padding-right: 8px; justify-content: space-between; padding: 2px 0; font-size: 0.9rem;  text-align: center; }
        .market-row .label { color: #000; font-weight: 600; text-align: center; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem; }
        .market-row .value { font-weight: 600; color: #000; text-align: center; flex: 1; }
        .market-row.investor { }
        .market-row.ma120 { }
        .pos { color: #000; }
        .neg { color: #000; }

        /* Manual fields */
        .manual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        .manual-field h4 { font-size: 0.75rem; font-weight: 700; color: #888; margin-bottom: 4px; }
        .manual-field .badge { display: inline-block; padding: 2px 10px; border-radius:0; font-size: 0.75rem; font-weight: 700; }
        .badge-up { background: #ffebee; color: #c62828; }
        .badge-down { background: #e3f2fd; color: #1565c0; }
        .badge-hold { background: #f5f5f5; color: #666; }

        .note-section { margin-top: 10px; }
        .note-section h4 { font-size: 0.78rem; font-weight: 700; color: #333; margin-bottom: 4px; padding: 4px 8px; background: #f5f5f5; border-radius:0; display: inline-block; }
        .note-section p { font-size: 0.82rem; line-height: 1.6; color: #444; padding: 8px 0; white-space: pre-wrap; }
        .note-section.plan h4 { background: #e8f5e9; color: #2e7d32; }
        .note-section.review h4 { background: #fff3e0; color: #e65100; }

        .empty-msg { text-align: center; color: #aaa; padding: 60px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

<!-- Password -->
<div class="pw-overlay" id="pwOverlay" style="display:none">
    <div class="pw-box">
        <h2>Journal</h2>
        <input type="password" id="pwInput" placeholder="Password" autofocus
               onkeyup="if(event.key==='Enter'){if(this.value==='0518'){document.getElementById('pwOverlay').style.display='none';document.getElementById('mainContent').classList.remove('pw-hidden');loadJournal();}else{this.style.borderColor='#cc0000';this.value='';}}">
    </div>
</div>

<div id="mainContent" >
    <header style="position:relative;">
        <h1>Journal</h1>
        <div style="position:absolute;top:16px;right:24px;display:flex;gap:8px;">
            <a href="https://docs.google.com/spreadsheets/d/13HXDxF62ILXyRz7meRZ5CxJT5HfWAwIKc8IsCavuVXk/edit" target="_blank" style="padding:6px 16px;background:#0F9D58;color:#fff;text-decoration:none;border-radius:0;font-size:0.85rem;font-weight:600;">Sheet</a>
            <a href="index.html" style="padding:6px 16px;background:#e0e0e0;color:#333;text-decoration:none;border-radius:0;font-size:0.85rem;font-weight:600;">Home</a>
        </div>
    </header>
    <div class="content">
        <div class="timeline" id="timeline">
            <div class="empty-msg">로딩 중...</div>
        </div>
    </div>
</div>

<script>
const SHEET_ID = '13HXDxF62ILXyRz7meRZ5CxJT5HfWAwIKc8IsCavuVXk';

function sheetUrl(sheetName) {
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
}

function fmtNum(v) {
    if (!v && v !== 0) return '-';
    var s = String(v);
    if (s.includes('%')) { var pn = parseFloat(s); return isNaN(pn) ? s : pn.toFixed(1) + '%'; }
    var n = parseFloat(s.replace(/,/g, ''));
    if (isNaN(n)) return v;
    if (s.includes('.')) return n.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1});
    return n.toLocaleString();
}

function chgCls(v) {
    if (!v && v !== 0) return '';
    var n = parseFloat(String(v).replace(/,/g, ''));
    if (isNaN(n)) return '';
    if (n > 0) return 'pos';
    if (n < 0) return 'neg';
    return '';
}

function badgeHtml(v) {
    if (!v) return '<span class="badge badge-hold">-</span>';
    var lower = String(v).toLowerCase();
    if (lower === 'up' || lower === '상승') return '<span style="background:#FADBD8;padding:2px 10px;border-radius:0;">UP</span>';
    if (lower === 'down' || lower === '하락') return '<span style="background:#D6EAF8;padding:2px 10px;border-radius:0;">DOWN</span>';
    return '<span class="badge badge-hold">' + v + '</span>';
}

async function loadJournal() {
    try {
        var res = await fetch(sheetUrl('Data'));
        var text = await res.text();
        var json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
        var rows = json.table.rows;

        var entries = [];
        rows.forEach(function(row) {
            var c = row.c;
            if (!c[0] || !c[0].v) return;
            var dateVal = String(c[0].v);
            // 헤더 행 스킵
            if (dateVal === '날짜') return;
            // Date(2026,2,31) → 2026-03-31
            var m = dateVal.match(/Date\((\d+),(\d+),(\d+)\)/);
            var dateStr;
            if (m) {
                var y = parseInt(m[1]), mo = parseInt(m[2]) + 1, d = parseInt(m[3]);
                dateStr = y + '-' + String(mo).padStart(2,'0') + '-' + String(d).padStart(2,'0');
            } else {
                dateStr = String(dateVal);
            }

            function val(i) { return (c[i] && c[i].v != null) ? c[i].v : ''; }

            entries.push({
                date: dateStr,
                dow: val(1),
                kClose: val(2), kChg: val(3), kVol: val(4), kVolChg: val(5),
                kUp: val(6), kFlat: val(7), kDown: val(8),
                kPer: val(9), kFor: val(10), kInst: val(11),
                qClose: val(12), qChg: val(13), qVol: val(14), qVolChg: val(15),
                qUp: val(16), qFlat: val(17), qDown: val(18),
                qPer: val(19), qFor: val(20), qInst: val(21),
                k_ma120: val(22), q_ma120: val(23), nqClose: val(24), nqChg: val(25), nqVol: val(26), nqVolChg: val(27),
                
            });
        });

        // Journal 시트에서 장전계획/장후복기 로드
        try {
            var jRes = await fetch(sheetUrl('Journal'));
            var jText = await jRes.text();
            var jJson = JSON.parse(jText.substring(jText.indexOf('{'), jText.lastIndexOf('}') + 1));
            var jMap = {};
            jJson.table.rows.forEach(function(row) {
                var jc = row.c;
                if (!jc[0] || !jc[0].v) return;
                var jDateVal = String(jc[0].v);
                if (jDateVal === '날짜') return;
                var jm = jDateVal.match(/Date\((\d+),(\d+),(\d+)\)/);
                var jDate;
                if (jm) { jDate = parseInt(jm[1]) + '-' + String(parseInt(jm[2])+1).padStart(2,'0') + '-' + String(parseInt(jm[3])).padStart(2,'0'); }
                else { jDate = jDateVal; }
                jMap[jDate] = {
                    plan: (jc[2] && jc[2].v) ? jc[2].v : '',
                    review: (jc[3] && jc[3].v) ? jc[3].v : '',
                };
            });
            entries.forEach(function(e) {
                var j = jMap[e.date];
                if (j) { e.plan = j.plan; e.review = j.review; }
            });
        } catch(je) { console.log('Journal load:', je); }

        entries.sort(function(a, b) { return b.date.localeCompare(a.date); });

        if (entries.length === 0) {
            document.getElementById('timeline').innerHTML = '<div class="empty-msg">일지가 없습니다</div>';
            return;
        }

        var html = '';
        entries.forEach(function(e) {
            var dowNames = ['일','월','화','수','목','금','토'];
            var dow = e.dow;
            if (!dow || dow.toString().indexOf('Date') >= 0) {
                dow = dowNames[new Date(e.date).getDay()];
            }

            function mktRow(label, val, bg) {
                var style = bg ? ' style="background:' + bg + ';"' : '';
                return '<div class="market-row"' + style + '><span class="label">' + label + '</span><span class="value">' + fmtNum(val) + '</span></div>';
            }
            function mktColorRow(label, val, colorType) {
                var bg = '';
                if (colorType === 'up') bg = 'background:#FADBD8;';
                else if (colorType === 'flat') bg = 'background:#f0f0f0;';
                else if (colorType === 'down') bg = 'background:#D6EAF8;';
                return '<div class="market-row" style="' + bg + '"><span class="label">' + label + '</span><span class="value">' + fmtNum(val) + '</span></div>';
            }
            function mktChgRow(label, val) {
                var cls = chgCls(val);
                var bg = '';
                if (cls === 'pos') bg = 'background:#FADBD8;';
                else if (cls === 'neg') bg = 'background:#D6EAF8;';
                return '<div class="market-row" style="' + bg + '"><span class="label">' + label + '</span><span class="value">' + (val ? val : '-') + '</span></div>';
            }

            html += '<div class="tl-entry">';
            html += '<div class="tl-dot"></div>';
            html += '<div class="tl-date">' + e.date + ' (' + dow + ')</div>';
            html += '<div class="tl-card">';

            // Market data
            html += '<div class="market-grid" style="flex:1;">';
            html += '<div style="display:grid;grid-template-columns:1fr 1fr;border:1px solid #333;overflow:hidden;height:100%;"><div class="market-col kospi"><h3>코스피</h3>';
            html += mktRow('지수', e.kClose, '#f0f0f0');
            html += mktChgRow('변동', e.kChg);
            html += mktRow('거래대금', e.kVol, '#f0f0f0');
            html += mktChgRow('변동', e.kVolChg);
            html += '<div style="border-bottom:1px solid #999;margin:0;"></div>';
            html += mktColorRow('상승', e.kUp, 'up') + mktColorRow('보합', e.kFlat, 'flat') + mktColorRow('하락', e.kDown, 'down');
            html += '<div style="border-bottom:1px solid #999;margin:0;"></div>';
            html += (function(){ var cls=chgCls(e.kPer); var bg=''; if(cls==='pos') bg='background:#FADBD8;'; else if(cls==='neg') bg='background:#D6EAF8;'; return '<div class="market-row investor" style="'+bg+'"><span class="label">개인</span><span class="value">'+fmtNum(e.kPer)+'</span></div>'; })() + (function(){ var cls=chgCls(e.kFor); var bg=''; if(cls==='pos') bg='background:#FADBD8;'; else if(cls==='neg') bg='background:#D6EAF8;'; return '<div class="market-row investor" style="'+bg+'"><span class="label">외국인</span><span class="value">'+fmtNum(e.kFor)+'</span></div>'; })() + (function(){ var cls=chgCls(e.kInst); var bg=''; if(cls==='pos') bg='background:#FADBD8;'; else if(cls==='neg') bg='background:#D6EAF8;'; return '<div class="market-row investor" style="'+bg+'"><span class="label">기관</span><span class="value">'+fmtNum(e.kInst)+'</span></div>'; })();
            html += '<div style="border-bottom:1px solid #999;margin:0;"></div>';
            html += (function(v){ var bg=''; if(v&&v.toLowerCase()==='up') bg='background:#FADBD8;'; else if(v&&v.toLowerCase()==='down') bg='background:#D6EAF8;'; return '<div class="market-row ma120" style="'+bg+'"><span class="label">120일선</span><span class="value">'+(v||'-')+'</span></div>'; })(e.k_ma120);
            html += '</div>';

            html += '<div class="market-col kosdaq" style=""><h3>코스닥</h3>';
            html += mktRow('지수', e.qClose, '#f0f0f0');
            html += mktChgRow('변동', e.qChg);
            html += mktRow('거래대금', e.qVol, '#f0f0f0');
            html += mktChgRow('변동', e.qVolChg);
            html += '<div style="border-bottom:1px solid #999;margin:0;"></div>';
            html += mktColorRow('상승', e.qUp, 'up') + mktColorRow('보합', e.qFlat, 'flat') + mktColorRow('하락', e.qDown, 'down');
            html += '<div style="border-bottom:1px solid #999;margin:0;"></div>';
            html += (function(){ var cls=chgCls(e.qPer); var bg=''; if(cls==='pos') bg='background:#FADBD8;'; else if(cls==='neg') bg='background:#D6EAF8;'; return '<div class="market-row investor" style="'+bg+'"><span class="label">개인</span><span class="value">'+fmtNum(e.qPer)+'</span></div>'; })() + (function(){ var cls=chgCls(e.qFor); var bg=''; if(cls==='pos') bg='background:#FADBD8;'; else if(cls==='neg') bg='background:#D6EAF8;'; return '<div class="market-row investor" style="'+bg+'"><span class="label">외국인</span><span class="value">'+fmtNum(e.qFor)+'</span></div>'; })() + (function(){ var cls=chgCls(e.qInst); var bg=''; if(cls==='pos') bg='background:#FADBD8;'; else if(cls==='neg') bg='background:#D6EAF8;'; return '<div class="market-row investor" style="'+bg+'"><span class="label">기관</span><span class="value">'+fmtNum(e.qInst)+'</span></div>'; })();
            html += '<div style="border-bottom:1px solid #999;margin:0;"></div>';
            html += (function(v){ var bg=''; if(v&&v.toLowerCase()==='up') bg='background:#FADBD8;'; else if(v&&v.toLowerCase()==='down') bg='background:#D6EAF8;'; return '<div class="market-row ma120" style="'+bg+'"><span class="label">120일선</span><span class="value">'+(v||'-')+'</span></div>'; })(e.q_ma120);
            html += '</div></div>';

            // 장전계획 / 장후복기
            html += '<div style="display:flex;flex-direction:column;border:1px solid #333;height:100%;">';
            html += '<div style="flex:5;background:#f7f7f7;padding:12px;"><div style="font-size:0.9rem;font-weight:700;color:#000;margin-bottom:6px;">장전 계획</div><div style="font-size:0.9rem;line-height:1.6;white-space:pre-wrap;">' + (e.plan || '<span style="color:#ccc;">-</span>') + '</div></div>';
            html += '<div style="flex:7;background:#f7f7f7;padding:12px;border-top:1px solid #333;"><div style="font-size:0.9rem;font-weight:700;color:#000;margin-bottom:6px;">장후 복기</div><div style="font-size:0.9rem;line-height:1.6;white-space:pre-wrap;">' + (e.review || '<span style="color:#ccc;">-</span>') + '</div></div>';
            html += '</div>';

            html += '</div>';

            html += '</div></div>';
        });

        document.getElementById('timeline').innerHTML = html;
    } catch(err) {
        document.getElementById('timeline').innerHTML = '<div class="empty-msg">로딩 실패: ' + err.message + '</div>';
    }
}
loadJournal();
</script>
</body>
</html>
