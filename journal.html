<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal</title>
    <link href='https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap' rel='stylesheet'>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #f8f9fa; color: #333; }

        /* Password */
        .pw-overlay { position: fixed; inset: 0; background: #f8f9fa; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .pw-box { background: #fff; border-radius:0; padding: 40px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.1); max-width: 320px; width: 90%; }
        .pw-box h2 { font-size: 1.2rem; margin-bottom: 20px; }
        .pw-box input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius:0; font-size: 1rem; text-align: center; outline: none; }
        .pw-box input:focus { border-color: #333; }
        .pw-hidden { display: none; }

        /* Layout */
        header { background: #fff; padding: 20px 24px; border-bottom: 1px solid #eee; position: relative; text-align: center; }
        header h1 { font-size: 1.6rem; font-weight: 800; color: #222; }
        .content { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* Timeline */
        .timeline { position: relative; padding-left: 32px; }
        .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: #ddd; }
        .tl-entry { position: relative; margin-bottom: 32px; }
        .tl-dot { position: absolute; left: -27px; top: 8px; width: 12px; height: 12px; border-radius: 50%; background: #333; border: 2px solid #fff; box-shadow: 0 0 0 2px #333; }
        .tl-date { font-size: 0.85rem; font-weight: 800; color: #000; margin-bottom: 8px; }
        .tl-card { background: #fff; display: flex; flex-direction: column; border-radius:0; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #c8e6c9; }

        /* Market data grid */
        .market-grid { display: grid; grid-template-columns: 32fr 68fr; gap: 0; margin-bottom: 0; flex: 1; align-items: stretch; }
        .market-col h3 { font-size: 0.9rem; font-weight: 700; color: #fff; background: #333; padding: 6px 10px; border-radius:0; margin-bottom: 0; text-align: center; }
        .market-col.kospi h3 { }
        .market-col.kosdaq h3 { }
        
        .market-col { padding: 0; display: flex; flex-direction: column; }
        .market-col + .market-col { border-left: 1px solid #ddd; }
        .market-col .mkt-body { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .market-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; font-size: 0.9rem; text-align: center; min-height: 28px; }
        .market-row .label { color: #000; font-weight: 600; text-align: center; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem; }
        .market-row .value { font-weight: 600; color: #000; text-align: center; flex: 1; }
        .market-row.investor { }
        .market-row.ma120 { }
        .pos { color: #000; }
        .neg { color: #000; }

        /* Manual fields */
        .manual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        .manual-field h4 { font-size: 0.75rem; font-weight: 700; color: #888; margin-bottom: 4px; }
        .manual-field .badge { display: inline-block; padding: 2px 10px; border-radius:0; font-size: 0.75rem; font-weight: 700; }
        .badge-up { background: #ffebee; color: #c62828; }
        .badge-down { background: #e3f2fd; color: #1565c0; }
        .badge-hold { background: #f5f5f5; color: #666; }

        .note-section { margin-top: 10px; }
        .note-section h4 { font-size: 0.78rem; font-weight: 700; color: #333; margin-bottom: 4px; padding: 4px 8px; background: #f5f5f5; border-radius:0; display: inline-block; }
        .note-section p { font-size: 0.82rem; line-height: 1.6; color: #444; padding: 8px 0; white-space: pre-wrap; }
        .note-section.plan h4 { background: #e8f5e9; color: #2e7d32; }
        .note-section.review h4 { background: #fff3e0; color: #e65100; }

        .empty-msg { text-align: center; color: #aaa; padding: 60px 0; font-size: 0.9rem; }

        /* Tabs */
        .tab-bar { display: flex; gap: 0; margin-bottom: 0; border-bottom: 3px solid #333; }
        .tab-btn { padding: 12px 32px; font-size: 1rem; font-weight: 700; cursor: pointer; background: #e8e8e8; border: none; color: #999; border-bottom: 3px solid transparent; margin-bottom: -3px; transition: all 0.15s; }
        .tab-btn:hover { background: #f5f5f5; color: #555; }
        .tab-btn.active { background: #333; color: #fff; border-bottom: 3px solid #333; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Ideas */
        .ideas-search { width: 100%; max-width: 400px; padding: 10px 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; margin-bottom: 20px; font-family: inherit; }
        .ideas-search:focus { border-color: #333; }
        .stock-group { margin-bottom: 24px; }
        .stock-header { display: flex; align-items: center; cursor: pointer; user-select: none; }
        .stock-header-label { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; background: #333; color: #fff; border-radius: 8px 8px 0 0; }
        .stock-header .stock-name { font-size: 1rem; font-weight: 700; }
        .stock-header .stock-code { font-size: 0.8rem; color: #aaa; }
        .stock-header .stock-count { font-size: 0.8rem; color: #ccc; }
        .stock-header .arrow { transition: transform 0.2s; font-size: 0.75rem; }
        .stock-header.open .arrow { transform: rotate(90deg); }
        .stock-body { display: none; border: 1px solid #e0e0e0; border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
        .stock-body.open { display: block; }
        .idea-row { display: flex; align-items: flex-start; padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 0.88rem; }
        .idea-row:last-child { border-bottom: none; }
        .idea-date { flex: 0 0 110px; font-weight: 600; color: #555; }
        .idea-action { flex: 0 0 52px; text-align: center; }
        .idea-action span { display: inline-block; padding: 3px 10px; font-size: 0.82rem; font-weight: 700; }
        .action-buy { background: #FADBD8; color: #c0392b; border-radius: 4px; }
        .action-sell { background: #D6EAF8; color: #1565c0; border-radius: 4px; }
        .action-hold { background: #f0f0f0; color: #666; border-radius: 4px; }
        .idea-text { flex: 1; line-height: 1.6; white-space: pre-wrap; color: #333; padding-left: 10px; }
    </style>
</head>
<body>

<!-- Password -->
<div class="pw-overlay" id="pwOverlay">
    <div class="pw-box">
        <h2>Journal</h2>
        <input type="password" id="pwInput" placeholder="Password" autofocus
               onkeyup="if(event.key==='Enter'){checkPw(this.value);}">
        <div id="pwWarn" style="margin-top:12px;font-size:0.8rem;color:#cc0000;display:none;"></div>
    </div>
</div>
<script>
var _pwFail = 0;
async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(v) {
    const hash = await sha256(v);
    if (hash === '97b2df85b9cd4686f08a7b81d835c10bbfe5b4e16af9b668f2c161e4fbca99f5') {
        document.getElementById('pwOverlay').style.display='none';
        document.getElementById('mainContent').classList.remove('pw-hidden');
        loadJournal();
    } else {
        _pwFail++;
        var inp = document.getElementById('pwInput');
        var warn = document.getElementById('pwWarn');
        inp.style.borderColor='#cc0000'; inp.value='';
        warn.style.display='block';
        if (_pwFail < 3) {
            warn.textContent = '\u26A0 ' + (3 - _pwFail) + '\uD68C \uCD94\uAC00 \uC2E4\uD328 \uC2DC \uD654\uBA74\uC774 \uC7A0\uAE41\uB2C8\uB2E4.';
        } else {
            warn.textContent = '\uD83D\uDD12 \uBCF4\uC548 \uC815\uCC45\uC5D0 \uC758\uD574 \uD654\uBA74\uC774 \uC7A0\uACBC\uC2B5\uB2C8\uB2E4. \uAD00\uB9AC\uC790\uC5D0\uAC8C \uBB38\uC758\uD558\uC138\uC694.';
            inp.disabled = true;
            inp.placeholder = 'Locked';
            setTimeout(function(){ inp.disabled = false; inp.placeholder = 'Password'; warn.style.display = 'none'; _pwFail = 0; }, 60000);
        }
    }
}
</script>

<div id="mainContent" class="pw-hidden">
    <header style="position:relative;">
        <h1>Journal</h1>
        <div style="position:absolute;top:16px;right:24px;display:flex;gap:8px;">
            <a href="https://docs.google.com/spreadsheets/d/13HXDxF62ILXyRz7meRZ5CxJT5HfWAwIKc8IsCavuVXk/edit" target="_blank" style="padding:6px 16px;background:#0F9D58;color:#fff;text-decoration:none;border-radius:0;font-size:0.85rem;font-weight:600;">Sheet</a>
            <a href="index.html" style="padding:6px 16px;background:#e0e0e0;color:#333;text-decoration:none;border-radius:0;font-size:0.85rem;font-weight:600;">Home</a>
        </div>
    </header>
    <div class="content">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('journal')">Journal</button>
            <button class="tab-btn" onclick="switchTab('ideas')">Ideas</button>
        </div>
        <div id="panelJournal" class="tab-panel active" style="padding-top:24px;">
            <div class="timeline" id="timeline">
                <div class="empty-msg">로딩 중...</div>
            </div>
        </div>
        <div id="panelIdeas" class="tab-panel" style="padding-top:24px;">
            <input type="text" class="ideas-search" id="ideasSearch" placeholder="종목명 검색..." oninput="filterIdeas()">
            <div id="ideasList"><div class="empty-msg">로딩 중...</div></div>
        </div>
    </div>
</div>

<script>
const SHEET_ID = '13HXDxF62ILXyRz7meRZ5CxJT5HfWAwIKc8IsCavuVXk';
const GAPI_KEY = 'AIzaSyCHPiRby5FVAIKDwneZHy1KGl3SfycjZEw';

function sheetUrl(sheetName) {
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
}

// Sheets API v4로 셀 서식(밑줄/볼드) 포함 텍스트 가져오기
async function fetchRichText(sheetName, range) {
    var url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?ranges=${encodeURIComponent(sheetName+'!'+range)}&fields=sheets.data.rowData.values(effectiveValue,textFormatRuns,effectiveFormat.textFormat)&key=${GAPI_KEY}`;
    var res = await fetch(url);
    if (!res.ok) return {};
    var json = await res.json();
    var sheet = json.sheets && json.sheets[0];
    if (!sheet || !sheet.data || !sheet.data[0]) { console.warn('Rich text: no sheet data'); return {}; }
    var rowData = sheet.data[0].rowData || [];
    // {rowIndex: {colOffset: htmlString}}
    var result = {};
    rowData.forEach(function(rd, ri) {
        if (!rd.values) return;
        rd.values.forEach(function(cell, ci) {
            if (!cell) return;
            var text = '';
            if (cell.effectiveValue) {
                text = cell.effectiveValue.stringValue || cell.effectiveValue.numberValue || '';
            }
            if (!text) return;
            text = String(text);
            // textFormatRuns가 있으면 부분 서식 적용
            if (cell.textFormatRuns && cell.textFormatRuns.length > 0) {
                var runs = cell.textFormatRuns;
                var html = '';
                for (var k = 0; k < runs.length; k++) {
                    var start = runs[k].startIndex || 0;
                    var end = (k + 1 < runs.length) ? runs[k + 1].startIndex : text.length;
                    var seg = text.substring(start, end).replace(/&/g,'&amp;').replace(/</g,'&lt;');
                    var fmt = runs[k].format || {};
                    if (fmt.underline) seg = '<span style="text-decoration:underline;line-height:inherit;display:inline">' + seg + '</span>';
                    if (fmt.bold) seg = '<span style="font-weight:bold;line-height:inherit;display:inline">' + seg + '</span>';
                    html += seg;
                }
                if (!result[ri]) result[ri] = {};
                result[ri][ci] = html.replace(/\s+$/, '');
            } else if (cell.effectiveFormat && cell.effectiveFormat.textFormat) {
                // 셀 전체 서식
                var fmt = cell.effectiveFormat.textFormat;
                var ht = text.replace(/&/g,'&amp;').replace(/</g,'&lt;');
                if (fmt.underline) ht = '<span style="text-decoration:underline">' + ht + '</span>';
                if (fmt.bold) ht = '<span style="font-weight:bold">' + ht + '</span>';
                if (ht !== text.replace(/&/g,'&amp;').replace(/</g,'&lt;')) {
                    if (!result[ri]) result[ri] = {};
                    result[ri][ci] = ht;
                }
            }
        });
    });
    return result;
}

function fmtNum(v) {
    if (!v && v !== 0) return '-';
    var s = String(v);
    if (s.includes('%')) { var pn = parseFloat(s); return isNaN(pn) ? s : pn.toFixed(1) + '%'; }
    var n = parseFloat(s.replace(/,/g, ''));
    if (isNaN(n)) return v;
    if (s.includes('.')) return n.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:1});
    return n.toLocaleString();
}

function chgCls(v) {
    if (!v && v !== 0) return '';
    var n = parseFloat(String(v).replace(/,/g, ''));
    if (isNaN(n)) return '';
    if (n > 0) return 'pos';
    if (n < 0) return 'neg';
    return '';
}

function badgeHtml(v) {
    if (!v) return '<span class="badge badge-hold">-</span>';
    var lower = String(v).toLowerCase();
    if (lower === 'up' || lower === '상승') return '<span style="background:#FADBD8;padding:2px 10px;border-radius:0;">UP</span>';
    if (lower === 'down' || lower === '하락') return '<span style="background:#D6EAF8;padding:2px 10px;border-radius:0;">DOWN</span>';
    return '<span class="badge badge-hold">' + v + '</span>';
}

async function loadJournal() {
    try {
        var res = await fetch(sheetUrl('Data'));
        var text = await res.text();
        var json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
        var rows = json.table.rows;

        var entries = [];
        rows.forEach(function(row) {
            var c = row.c;
            if (!c[0] || !c[0].v) return;
            var dateVal = String(c[0].v);
            // 헤더 행 스킵
            if (dateVal === '날짜') return;
            // Date(2026,2,31) → 2026-03-31
            var m = dateVal.match(/Date\((\d+),(\d+),(\d+)\)/);
            var dateStr;
            if (m) {
                var y = parseInt(m[1]), mo = parseInt(m[2]) + 1, d = parseInt(m[3]);
                dateStr = y + '-' + String(mo).padStart(2,'0') + '-' + String(d).padStart(2,'0');
            } else {
                dateStr = String(dateVal);
            }

            function val(i) { return (c[i] && c[i].v != null) ? c[i].v : ''; }

            entries.push({
                date: dateStr,
                dow: val(1),
                kClose: val(2), kChg: val(3), kVol: val(4), kVolChg: val(5),
                kUp: val(6), kFlat: val(7), kDown: val(8),
                kPer: val(9), kFor: val(10), kInst: val(11),
                qClose: val(12), qChg: val(13), qVol: val(14), qVolChg: val(15),
                qUp: val(16), qFlat: val(17), qDown: val(18),
                qPer: val(19), qFor: val(20), qInst: val(21),
                k_ma120: val(22), q_ma120: val(23), nqClose: val(24), nqChg: val(25), nqVol: val(26), nqVolChg: val(27),
                fClose: val(28), fChg: val(29), fVol: val(30), fVolChg: val(31),
                fUp: val(32), fFlat: val(33), fDown: val(34),
                fPer: val(35), fFor: val(36), fInst: val(37),
                f_ma120: val(38),
            });
        });

        // Journal 시트에서 장전계획/장후복기 로드 (서식 포함)
        try {
            var jRes = await fetch(sheetUrl('Journal'));
            var jText = await jRes.text();
            var jJson = JSON.parse(jText.substring(jText.indexOf('{'), jText.lastIndexOf('}') + 1));
            // 서식 데이터 가져오기 (C, D 컬럼 = 장전계획, 장후복기)
            var richText = {};
            try { richText = await fetchRichText('Journal', 'A:D'); } catch(re) { console.log('Rich text fetch:', re); }
            var jMap = {};
            jJson.table.rows.forEach(function(row, rowIdx) {
                var jc = row.c;
                if (!jc[0] || !jc[0].v) return;
                var jDateVal = String(jc[0].v);
                if (jDateVal === '날짜') return;
                var jm = jDateVal.match(/Date\((\d+),(\d+),(\d+)\)/);
                var jDate;
                if (jm) { jDate = parseInt(jm[1]) + '-' + String(parseInt(jm[2])+1).padStart(2,'0') + '-' + String(parseInt(jm[3])).padStart(2,'0'); }
                else { jDate = jDateVal; }
                var rt = richText[rowIdx + 1] || {};  // Sheets API는 헤더 포함(+1), gviz는 데이터만
                jMap[jDate] = {
                    plan: rt[2] || ((jc[2] && jc[2].v) ? jc[2].v : ''),
                    review: rt[3] || ((jc[3] && jc[3].v) ? jc[3].v : ''),
                    planRich: !!rt[2],
                    reviewRich: !!rt[3],
                };
            });
            entries.forEach(function(e) {
                var j = jMap[e.date];
                if (j) { e.plan = j.plan; e.review = j.review; e.planRich = j.planRich; e.reviewRich = j.reviewRich; delete jMap[e.date]; }
            });
            // Journal 시트에만 있는 날짜도 카드 생성
            Object.keys(jMap).forEach(function(jDate) {
                var j = jMap[jDate];
                if (j.plan || j.review) {
                    entries.push({
                        date: jDate, dow: '', kClose:'', kChg:'', kVol:'', kVolChg:'',
                        kUp:'', kFlat:'', kDown:'', kPer:'', kFor:'', kInst:'',
                        qClose:'', qChg:'', qVol:'', qVolChg:'',
                        qUp:'', qFlat:'', qDown:'', qPer:'', qFor:'', qInst:'',
                        k_ma120:'', q_ma120:'', nqClose:'', nqChg:'', nqVol:'', nqVolChg:'',
                        fClose:'', fChg:'', fVol:'', fVolChg:'',
                        fUp:'', fFlat:'', fDown:'', fPer:'', fFor:'', fInst:'', f_ma120:'',
                        plan: j.plan, review: j.review, planRich: j.planRich, reviewRich: j.reviewRich,
                    });
                }
            });
        } catch(je) { console.log('Journal load:', je); }

        entries.sort(function(a, b) { return b.date.localeCompare(a.date); });

        if (entries.length === 0) {
            document.getElementById('timeline').innerHTML = '<div class="empty-msg">일지가 없습니다</div>';
            return;
        }

        var html = '';
        entries.forEach(function(e) {
            var dowNames = ['일','월','화','수','목','금','토'];
            var dow = e.dow;
            if (!dow || dow.toString().indexOf('Date') >= 0) {
                dow = dowNames[new Date(e.date).getDay()];
            }

            function mktRow(label, val, bg) {
                var style = bg ? ' style="background:' + bg + ';"' : '';
                return '<div class="market-row"' + style + '><span class="label">' + label + '</span><span class="value">' + fmtNum(val) + '</span></div>';
            }
            function mktColorRow(label, val, colorType) {
                var bg = '';
                if (colorType === 'up') bg = 'background:#FADBD8;';
                else if (colorType === 'flat') bg = 'background:#f0f0f0;';
                else if (colorType === 'down') bg = 'background:#D6EAF8;';
                return '<div class="market-row" style="' + bg + '"><span class="label">' + label + '</span><span class="value">' + fmtNum(val) + '</span></div>';
            }
            function mktChgRow(label, val) {
                var cls = chgCls(val);
                var bg = '';
                if (cls === 'pos') bg = 'background:#FADBD8;';
                else if (cls === 'neg') bg = 'background:#D6EAF8;';
                return '<div class="market-row" style="' + bg + '"><span class="label">' + label + '</span><span class="value">' + (val ? val : '-') + '</span></div>';
            }

            html += '<div class="tl-entry">';
            html += '<div class="tl-dot"></div>';
            html += '<div class="tl-date">' + e.date + ' (' + dow + ')</div>';
            html += '<div class="tl-card">';

            // Market data
            html += '<div class="market-grid" style="flex:1;">';
            html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid #333;overflow:hidden;height:100%;"><div class="market-col kospi"><h3>코스피</h3><div class="mkt-body">';
            html += mktRow('지수', e.kClose, '#f0f0f0');
            html += mktChgRow('변동', e.kChg);
            html += mktRow('거래대금', e.kVol, '#f0f0f0');
            html += mktChgRow('변동', e.kVolChg);
            html += '<div style="border-bottom:1px solid #999;margin:0;"></div>';

// Tab switching
// ============================================================
var _ideasLoaded = false;
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b, i) {
        b.classList.toggle('active', (tab === 'journal' && i === 0) || (tab === 'ideas' && i === 1));
    });
    document.getElementById('panelJournal').classList.toggle('active', tab === 'journal');
    document.getElementById('panelIdeas').classList.toggle('active', tab === 'ideas');
    if (tab === 'ideas' && !_ideasLoaded) { _ideasLoaded = true; loadIdeas(); }
}

// ============================================================
// Ideas tab
// ============================================================
var _ideasData = {}; // { 종목: [{ date, dow, code, idea }] }

async function loadIdeas() {
    try {
        var res = await fetch(sheetUrl('Ideas'));
        var text = await res.text();
        var json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
        var rows = json.table.rows;

        _ideasData = {};
        rows.forEach(function(row) {
            var c = row.c;
            if (!c[0] || !c[0].v) return;
            var dateVal = String(c[0].v);
            if (dateVal === '날짜') return;
            var m = dateVal.match(/Date\((\d+),(\d+),(\d+)\)/);
            var dateStr;
            if (m) {
                var y = parseInt(m[1]), mo = parseInt(m[2]) + 1, d = parseInt(m[3]);
                dateStr = y + '-' + String(mo).padStart(2,'0') + '-' + String(d).padStart(2,'0');
            } else { dateStr = dateVal; }

            function val(i) { return (c[i] && c[i].v != null) ? String(c[i].v) : ''; }
            var dow = val(1);
            var code = val(2);
            var stock = val(3);
            var action = val(4);
            var idea = val(5);
            if (!stock) return;

            if (!_ideasData[stock]) _ideasData[stock] = { code: code, items: [] };
            _ideasData[stock].items.push({ date: dateStr, dow: dow, action: action, idea: idea });
        });

        // 종목별 날짜 내림차순 정렬
        Object.keys(_ideasData).forEach(function(k) {
            _ideasData[k].items.sort(function(a, b) { return b.date.localeCompare(a.date); });
        });

        renderIdeas();
    } catch(err) {
        document.getElementById('ideasList').innerHTML = '<div class="empty-msg">로딩 실패: ' + err.message + '</div>';
    }
}

function renderIdeas(filter) {
    var keys = Object.keys(_ideasData).sort();
    if (filter) {
        var f = filter.toLowerCase();
        keys = keys.filter(function(k) { return k.toLowerCase().includes(f) || _ideasData[k].code.includes(f); });
    }
    if (keys.length === 0) {
        document.getElementById('ideasList').innerHTML = '<div class="empty-msg">데이터가 없습니다</div>';
        return;
    }
    var html = '';
    keys.forEach(function(stock) {
        var d = _ideasData[stock];
        var codeStr = d.code ? ' (' + d.code + ')' : '';
        html += '<div class="stock-group" data-stock="' + stock + '">';
        html += '<div class="stock-header" onclick="toggleStock(this)">';
        html += '<span class="stock-header-label">';
        html += '<span class="arrow">▶</span>';
        html += '<span class="stock-name">' + stock + '</span>';
        html += '<span class="stock-code">' + d.code + '</span>';
        html += '<span class="stock-count">' + d.items.length + '건</span>';
        html += '</span>';
        html += '</div>';
        html += '<div class="stock-body">';
        d.items.forEach(function(item) {
            var actionCls = 'action-hold', actionLabel = item.action || '-';
            if (item.action === '매수') { actionCls = 'action-buy'; }
            else if (item.action === '매도') { actionCls = 'action-sell'; }
            html += '<div class="idea-row">';
            html += '<div class="idea-date">' + item.date + '</div>';
            html += '<div class="idea-action"><span class="' + actionCls + '">' + actionLabel + '</span></div>';
            html += '<div class="idea-text">' + (item.idea || '-').replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</div>';
            html += '</div>';
        });
        html += '</div></div>';
    });
    document.getElementById('ideasList').innerHTML = html;
}

function toggleStock(el) {
    el.classList.toggle('open');
    el.nextElementSibling.classList.toggle('open');
}

function filterIdeas() {
    var q = document.getElementById('ideasSearch').value.trim();
    renderIdeas(q);
}
