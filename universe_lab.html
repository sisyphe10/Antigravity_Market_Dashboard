<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universe Lab (프로토타입)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<script>Chart.defaults.devicePixelRatio = 2 * (window.devicePixelRatio || 1); Chart.defaults.font.family = "'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif"; Chart.defaults.animation = false;</script>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Pretendard Variable',Pretendard,system-ui,-apple-system,sans-serif; background:#f4f5f7; color:#1f2937; }
  header { padding:18px 24px; background:#111827; color:#fff; display:flex; align-items:center; gap:16px; }
  header h1 { font-size:20px; margin:0; font-weight:700; }
  header .sub { font-size:12px; color:#9ca3af; }
  header a.back { margin-left:auto; color:#93c5fd; font-size:13px; text-decoration:none; font-weight:600; }
  .updated { font-size:11px; color:#6b7280; padding:6px 24px; background:#fff; border-bottom:1px solid #e5e7eb; }
  .tabs { display:flex; gap:8px; padding:12px 24px 0; background:#fff; border-bottom:1px solid #e5e7eb; }
  .tab { padding:9px 18px; font-size:15px; font-weight:600; color:#6b7280; cursor:pointer; border-radius:8px 8px 0 0; }
  .tab.active { color:#111827; background:#f4f5f7; border:1px solid #e5e7eb; border-bottom:none; }
  .panel { display:none; padding:18px 24px 40px; }
  .panel.active { display:block; }
  .toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .toolbar .lbl { font-size:13px; font-weight:600; color:#374151; margin-right:4px; }
  .mbtn { font-family:inherit; font-size:13px; font-weight:600; padding:7px 14px; background:#fff; color:#374151; border:1px solid #d1d5db; border-radius:7px; cursor:pointer; }
  .mbtn.active { background:#2563eb; color:#fff; border-color:#2563eb; }
  .dlbtn { font-family:inherit; font-size:13px; font-weight:600; padding:6px 14px; background:#dc2626; color:#fff; border:none; border-radius:8px; cursor:pointer; margin-left:auto; }
  .dlbtn:hover { background:#b91c1c; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:14px; }
  .legend { display:flex; align-items:center; gap:6px; font-size:12px; color:#111827; font-weight:600; margin-top:8px; }
  .legend .bar { width:160px; height:12px; border-radius:3px; background:linear-gradient(90deg,#16a34a,#f3f4f6,#dc2626); }
  table { width:100%; border-collapse:collapse; font-size:15px; }
  th,td { padding:9px 10px; border-bottom:1px solid #eef0f2; text-align:center; white-space:nowrap; color:#111827; }
  th { background:#f9fafb; color:#111827; font-weight:700; position:sticky; top:0; }
  td.l,th.l { text-align:center; }
  .pos { color:#dc2626; font-weight:600; }
  .neg { color:#16a34a; font-weight:600; }
  .up { color:#dc2626; font-weight:700; }
  .down { color:#16a34a; font-weight:700; }
  .flat { color:#9ca3af; }
  .new { color:#2563eb; font-weight:700; }
  .rk2col { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width:900px){ .rk2col { grid-template-columns:1fr; } }
  .note { font-size:12px; color:#9ca3af; margin:7px 0 0; }
  .exit { font-size:13px; color:#6b7280; margin-top:10px; }
  .qcap { font-size:12px; color:#9ca3af; }
  #heatmap { position:relative; overflow:hidden; background:#fff; width:100%; height:640px; }
</style>

<body>
<header>
  <h1>Universe Lab</h1>
  <span class="sub">프로토타입 · 히트맵 / 섹터 로테이션 / 순위 변화</span>
  <a class="back" href="universe.html">← Universe</a>
</header>
<div class="updated" id="updated">로딩 중...</div>
<div class="tabs">
  <div class="tab active" data-p="0">히트맵</div>
  <div class="tab" data-p="1">섹터 로테이션</div>
  <div class="tab" data-p="2">순위 변화</div>
</div>

<!-- 0: 히트맵 -->
<div class="panel active" id="p0">
  <div class="toolbar">
    <span class="lbl">색 기준</span>
    <button class="mbtn active" data-m="rsi">RSI(1M)</button>
    <button class="mbtn" data-m="w1">1W</button>
    <button class="mbtn" data-m="m1">1M</button>
    <button class="mbtn" data-m="ytd">YTD</button>
    <button class="mbtn" data-m="dd">DD</button>
    <button class="dlbtn" onclick="downloadHeatmap()">Download</button>
  </div>
  <div class="card">
    <div id="heatmap"></div>
    <div class="legend"><span>약세</span><span class="bar"></span><span>강세</span><span id="legScale" style="margin-left:10px;"></span></div>
  </div>
</div>

<!-- 1: 섹터 로테이션 -->
<div class="panel" id="p1">
  <div class="toolbar">
    <button class="dlbtn" onclick="downloadScatter()">Download</button>
  </div>
  <div class="card">
    <div style="height:600px;"><canvas id="scatter"></canvas></div>
  </div>
</div>

<!-- 2: 순위 변화 -->
<div class="panel" id="p2">
  <div class="toolbar">
    <button class="dlbtn" onclick="downloadRanks()">Download</button>
  </div>
  <div id="rankCapture">
    <div class="rk2col">
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:15px;">RSI(1M) 순위 (상위 40)</h3>
        <table id="rankRsi"><thead><tr><th>순위</th><th>Δ</th><th class="l">종목</th><th class="l">섹터</th><th>RSI(1M)</th></tr></thead><tbody></tbody></table>
      </div>
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:15px;">1W 순위 (상위 40)</h3>
        <table id="rankW1"><thead><tr><th>순위</th><th>Δ</th><th class="l">종목</th><th class="l">섹터</th><th>1W</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
    <div class="card" style="margin-top:18px;">
      <h3 style="margin:0 0 12px;font-size:15px;">순위권 이탈</h3>
      <div class="rk2col">
        <div><div style="font-weight:700;margin-bottom:6px;">RSI(1M)</div><div id="exitRsi"></div></div>
        <div><div style="font-weight:700;margin-bottom:6px;">1W</div><div id="exitW1"></div></div>
      </div>
    </div>
  </div>
  <p class="note" id="rkNote"></p>
</div>

<script>
// ── 공통 ──────────────────────────────────────────────────────────
var INDEX_BY_PREFIX={'KRX':'KOSPI','KOSDAQ':'KOSDAQ','NASDAQ':'NASDAQ','NYSE':'S&P 500','NYSEAMERICAN':'S&P 500','TPE':'TSEC','TYO':'NIKKEI','TSE':'TSX','HKG':'HSI','AMS':'STOXX','ETR':'STOXX','EPA':'STOXX'};
function pfx(tk){ return (tk && tk.indexOf(':')>=0) ? tk.split(':')[0] : ''; }
function pnum(s){ if(s===null||s===undefined||s==='') return null; var n=parseFloat(String(s).replace(/,/g,'').replace(/%/g,'')); return isNaN(n)?null:n; }
function shortName(tk,name,cur){ var t=(tk&&tk.indexOf(':')>=0)?tk.split(':').pop():tk; return (cur==='KRW'||cur==='JPY')?name:t; }

// 색상: 발산형 (음수=빨강, 0=연회색, 양수=초록). DD는 0=초록, 음수=빨강.
function lerp(a,b,t){ return Math.round(a+(b-a)*t); }
function rgb(c){ return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }
var C_NEG=[22,163,74], C_MID=[243,244,246], C_POS=[220,38,38];  // 한국식: 강세(양수)=빨강, 약세(음수)=녹색
function diverge(v, m){
  if(v===null||isNaN(v)) return 'rgb(229,231,235)';
  var t=Math.max(-1,Math.min(1, v/m));
  if(t>=0){ return rgb([lerp(C_MID[0],C_POS[0],t),lerp(C_MID[1],C_POS[1],t),lerp(C_MID[2],C_POS[2],t)]); }
  var u=-t; return rgb([lerp(C_MID[0],C_NEG[0],u),lerp(C_MID[1],C_NEG[1],u),lerp(C_MID[2],C_NEG[2],u)]);
}
var METRICS={
  rsi:{label:'RSI(1M)', m:20},
  w1: {label:'1W',      m:8},
  m1: {label:'1M',      m:20},
  ytd:{label:'YTD',     m:50},
  dd: {label:'DD',      m:25, dd:true}
};
function colorFor(v, key){
  var mm=METRICS[key];
  if(mm.dd){
    if(v===null||isNaN(v)) return 'rgb(229,231,235)';
    var d=Math.max(0,Math.min(1, (-v)/mm.m));  // 0=신고가, 1=깊은 낙폭
    // 빨강(신고가)→연회색→초록(깊은 낙폭): 중간을 연회색으로 우회해 갈색(빨강+초록 혼합) 방지
    if(d<=0.5){ var t=d/0.5; return rgb([lerp(C_POS[0],C_MID[0],t),lerp(C_POS[1],C_MID[1],t),lerp(C_POS[2],C_MID[2],t)]); }
    var u=(d-0.5)/0.5; return rgb([lerp(C_MID[0],C_NEG[0],u),lerp(C_MID[1],C_NEG[1],u),lerp(C_MID[2],C_NEG[2],u)]);
  }
  return diverge(v, mm.m);
}
// 트리맵 라벨 글자색은 검정(#111) 통일, 그림자 없음.

var STOCKS=[];     // {tk,name,cur,sector,mcap,rsi,w1,m1,ytd,dd,disp}
var METRIC='rsi';
var scatterChart=null;

Promise.all([
  fetch('universe.json?_='+Date.now()).then(function(r){return r.json();}),
  fetch('index_returns.json?_='+Date.now()).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
  fetch('universe_history.json?_='+Date.now()).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
  fetch('index_history.json?_='+Date.now()).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})
]).then(function(res){
  var uni=res[0], idxRet=res[1]||{}, uh=res[2], ih=res[3];
  document.getElementById('updated').textContent='데이터: universe '+(uni.updated_at||'')+(uh&&uh.dates?(' · history '+uh.dates[uh.dates.length-1]):'');
  var IDX1M=(idxRet&&idxRet.returns_1m)?idxRet.returns_1m:{};
  var vals=(uni.values||[]).slice(1);
  // universe.json 컬럼: 1=통화,2=섹터,3=티커,4=기업명,5=시총표시,7=YTD,9=1W,10=1M,14=시총raw(억),22=DD
  vals.forEach(function(r){
    var tk=r[3]||''; var p=pfx(tk);
    var m1=pnum(r[10]);
    var idx1m=IDX1M[INDEX_BY_PREFIX[p]];
    var rsi=(m1!==null&&idx1m!==undefined&&idx1m!==null)?(m1 - idx1m*100):null;
    var mcap=pnum(r[14])||0;
    STOCKS.push({ tk:tk, name:r[4]||'', cur:r[1]||'', sector:r[2]||'기타', mcap:mcap,
      disp:shortName(tk,r[4]||'',r[1]||''), rsi:rsi, w1:pnum(r[9]), m1:m1, ytd:pnum(r[7]), dd:pnum(r[22]) });
  });
  try{ buildHeatmap(); }catch(e){ console.error('heatmap',e); document.getElementById('hmNote').textContent='히트맵 오류: '+(e&&e.message); }
  try{ buildScatter(); }catch(e){ console.error('scatter',e); }
  try{ buildRanks(uh, ih, IDX1M); }catch(e){ console.error('ranks',e); document.getElementById('rkNote').textContent='순위 오류: '+(e&&e.message); }
}).catch(function(e){ document.getElementById('updated').textContent='로드 실패: '+e; console.error(e); });

// ── 탭 ────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click', function(){
    var p=t.getAttribute('data-p');
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.toggle('active', x===t); });
    document.querySelectorAll('.panel').forEach(function(x,i){ x.classList.toggle('active', String(i)===p); });
    if(p==='0') renderHeatmap();
    if(p==='1'&&scatterChart) scatterChart.resize();
  });
});
var _rzTimer=null;
window.addEventListener('resize', function(){ clearTimeout(_rzTimer); _rzTimer=setTimeout(function(){
  if(document.getElementById('p0').classList.contains('active')) renderHeatmap();
  if(scatterChart) scatterChart.resize();
}, 150); });

// ── 0. 히트맵 (순수 JS squarified 트리맵, DOM) ────────────────────
document.querySelectorAll('#p0 .mbtn').forEach(function(b){
  b.addEventListener('click', function(){
    document.querySelectorAll('#p0 .mbtn').forEach(function(x){ x.classList.toggle('active', x===b); });
    METRIC=b.getAttribute('data-m'); updateLegend(); renderHeatmap();
  });
});
function updateLegend(){
  var mm=METRICS[METRIC];
  document.getElementById('legScale').textContent=mm.label+'  ±'+mm.m+(mm.dd?' (0=신고가)':'%');
}
// Squarified treemap (Bruls/Huizing/van Wijk). data=[{item,value}] → [{item,x,y,w,h}]
function squarify(data, x, y, width, height){
  var clean=data.filter(function(d){return d.value>0;});
  var total=clean.reduce(function(a,d){return a+d.value;},0);
  if(total<=0||width<=0||height<=0) return [];
  var scale=(width*height)/total;
  var nodes=clean.map(function(d){return {item:d.item, area:d.value*scale};}).sort(function(a,b){return b.area-a.area;});
  var result=[]; var rect={x:x,y:y,w:width,h:height};
  function worst(row, side){ var sum=0,mx=-Infinity,mn=Infinity;
    for(var i=0;i<row.length;i++){ var a=row[i].area; sum+=a; if(a>mx)mx=a; if(a<mn)mn=a; }
    return Math.max((side*side*mx)/(sum*sum), (sum*sum)/(side*side*mn)); }
  function layout(row, rect){
    var sum=0; row.forEach(function(r){sum+=r.area;});
    if(rect.w>=rect.h){ var rw=sum/rect.h, ry=rect.y;
      row.forEach(function(r){ var rh=r.area/rw; result.push({item:r.item,x:rect.x,y:ry,w:rw,h:rh}); ry+=rh; });
      return {x:rect.x+rw,y:rect.y,w:rect.w-rw,h:rect.h};
    } else { var rh2=sum/rect.w, rx=rect.x;
      row.forEach(function(r){ var rw2=r.area/rh2; result.push({item:r.item,x:rx,y:rect.y,w:rw2,h:rh2}); rx+=rw2; });
      return {x:rect.x,y:rect.y+rh2,w:rect.w,h:rect.h-rh2}; }
  }
  var i=0;
  while(i<nodes.length){
    var row=[]; var side=Math.min(rect.w,rect.h);
    if(side<=0.01) break;
    while(i<nodes.length){
      var cand=row.concat([nodes[i]]);
      if(row.length===0 || worst(cand,side) <= worst(row,side)){ row.push(nodes[i]); i++; } else break;
    }
    rect=layout(row, rect);
    if(rect.w<=0.01||rect.h<=0.01) break;
  }
  return result;
}
function buildHeatmap(){
  updateLegend(); renderHeatmap();
}
function renderHeatmap(){
  var host=document.getElementById('heatmap'); if(!host) return;
  var W=host.clientWidth||host.offsetWidth||900, H=host.clientHeight||640;
  if(W<10) W=900; if(H<10) H=640;
  host.innerHTML='';
  var stocks=STOCKS.filter(function(s){ return s.mcap>0; });
  if(!stocks.length){ host.innerHTML='<div style="padding:20px;color:#888;">데이터 없음</div>'; return; }
  var bySec={};
  stocks.forEach(function(s){ (bySec[s.sector]||(bySec[s.sector]=[])).push(s); });
  var sectors=Object.keys(bySec).map(function(k){
    var sum=0; bySec[k].forEach(function(s){sum+=s.mcap;});
    return {item:{name:k, stocks:bySec[k]}, value:sum};
  });
  var secRects=squarify(sectors, 0,0,W,H);
  var CAP=20;
  var frag=document.createDocumentFragment();
  secRects.forEach(function(sr){
    var showCap = sr.h>32 && sr.w>56;
    var innerY=sr.y+(showCap?CAP:0), innerH=sr.h-(showCap?CAP:0);
    if(innerH>2 && sr.w>2){
      var stockRects=squarify(sr.item.stocks.map(function(s){return {item:s,value:s.mcap};}), sr.x, innerY, sr.w, innerH);
      stockRects.forEach(function(rr){
        var s=rr.item, v=s[METRIC], bg=colorFor(v,METRIC);
        var box=document.createElement('div');
        box.style.cssText='position:absolute;left:'+rr.x+'px;top:'+rr.y+'px;width:'+Math.max(0,rr.w-0.5)+'px;height:'+Math.max(0,rr.h-0.5)+'px;background:'+bg+';overflow:hidden;border:0.5px solid rgba(255,255,255,0.65);';
        box.title=s.disp+'  ['+s.sector+']\n시총 '+Math.round(s.mcap).toLocaleString()+'억 · '+METRICS[METRIC].label+' '+(v==null?'-':((v>0?'+':'')+Math.round(v)+'%'));
        if(rr.w>36 && rr.h>24){
          box.innerHTML='<div style="font:700 14px Pretendard;line-height:1.12;color:#111;padding:3px 4px 0;white-space:nowrap;">'+s.disp+'</div>'
            +(rr.h>44?'<div style="font:600 12px Pretendard;color:#111;padding:0 4px;white-space:nowrap;">'+(v==null?'':((v>0?'+':'')+Math.round(v)+'%'))+'</div>':'');
        }
        frag.appendChild(box);
      });
    }
    if(showCap){
      var cap=document.createElement('div');
      cap.style.cssText='position:absolute;left:'+sr.x+'px;top:'+sr.y+'px;width:'+sr.w+'px;height:'+CAP+'px;font:700 14px Pretendard;color:#0f172a;background:rgba(255,255,255,0.62);padding:2px 6px;overflow:hidden;white-space:nowrap;pointer-events:none;';
      cap.textContent=sr.item.name;
      frag.appendChild(cap);
    }
  });
  host.appendChild(frag);
}

// ── 1. 섹터 로테이션 (산점도) ─────────────────────────────────────
function buildScatter(){
  var agg={};
  STOCKS.forEach(function(s){
    if(s.rsi===null||s.w1===null||!s.mcap) return;
    var g=agg[s.sector]||(agg[s.sector]={w:0, rsi:0, w1:0, n:0});
    g.w+=s.mcap; g.rsi+=s.rsi*s.mcap; g.w1+=s.w1*s.mcap; g.n++;
  });
  var pts=[]; var maxW=0;
  Object.keys(agg).forEach(function(k){ var g=agg[k]; if(g.w<=0) return; maxW=Math.max(maxW,g.w); pts.push({sector:k,x:g.rsi/g.w,y:g.w1/g.w,w:g.w,n:g.n}); });
  if(!pts.length) return;
  pts.forEach(function(p){ p.r=8+22*Math.sqrt(p.w/maxW); });
  var xa=Math.max(5, Math.ceil(Math.max.apply(null,pts.map(function(p){return Math.abs(p.x);}))+2));
  var ya=Math.max(3, Math.ceil(Math.max.apply(null,pts.map(function(p){return Math.abs(p.y);}))+1));
  var quad={ id:'quad', beforeDraw:function(ch){ var a=ch.chartArea,sc=ch.scales,cx=sc.x.getPixelForValue(0),cy=sc.y.getPixelForValue(0),g=ch.ctx;
      g.save();
      g.fillStyle='#ffffff'; g.fillRect(0,0,ch.width,ch.height);                       // PNG 배경 흰색
      g.fillStyle='rgba(220,38,38,0.05)'; g.fillRect(cx,a.top,a.right-cx,cy-a.top);     // 우상 주도(강세=빨강)
      g.fillStyle='rgba(37,99,235,0.05)'; g.fillRect(a.left,a.top,cx-a.left,cy-a.top);  // 좌상 개선
      g.fillStyle='rgba(234,179,8,0.05)'; g.fillRect(cx,cy,a.right-cx,a.bottom-cy);     // 우하 둔화
      g.fillStyle='rgba(22,163,74,0.05)'; g.fillRect(a.left,cy,cx-a.left,a.bottom-cy);  // 좌하 소외(약세=녹색)
      g.strokeStyle='#cbd5e1'; g.lineWidth=1; g.beginPath(); g.moveTo(cx,a.top); g.lineTo(cx,a.bottom); g.moveTo(a.left,cy); g.lineTo(a.right,cy); g.stroke();
      g.fillStyle='#111827'; g.font='bold 14px Pretendard'; g.textBaseline='top';
      g.textAlign='right'; g.fillText('주도', a.right-8, a.top+6);
      g.textAlign='left';  g.fillText('개선', a.left+8, a.top+6);
      g.textAlign='right'; g.textBaseline='bottom'; g.fillText('둔화', a.right-8, a.bottom-6);
      g.textAlign='left';  g.fillText('소외', a.left+8, a.bottom-6);
      g.restore();
  }, afterDatasetsDraw:function(ch){
      var g=ch.ctx, meta=ch.getDatasetMeta(0), area=ch.chartArea, ds=ch.data.datasets[0].data;
      g.save(); g.font='700 12px Pretendard'; g.fillStyle='#111827'; g.textAlign='center'; g.textBaseline='middle';
      // 큰 버블부터 라벨 배치(버블 위, 잘리면 아래). 이미 놓인 라벨과 겹치면 생략 — 배경 투명.
      var items=meta.data.map(function(el,i){ return {x:el.x, y:el.y, r:ds[i].r||6, sector:ds[i].sector, w:g.measureText(ds[i].sector).width}; });
      items.sort(function(a,b){ return b.r-a.r; });
      var placed=[];
      function over(x,y,w,h){ for(var k=0;k<placed.length;k++){ var q=placed[k];
        if(x<q.x+q.w && x+w>q.x && y<q.y+q.h && y+h>q.y) return true; } return false; }
      items.forEach(function(it){
        var hw=it.w/2+2, cx=Math.max(area.left+hw, Math.min(area.right-hw, it.x));
        var cy=it.y-it.r-8; if(cy-9<area.top) cy=it.y+it.r+8;
        cy=Math.max(area.top+9, Math.min(area.bottom-9, cy));
        if(over(cx-hw, cy-9, it.w+4, 18)) return;   // 겹치면 라벨 생략(버블은 표시)
        placed.push({x:cx-hw, y:cy-9, w:it.w+4, h:18});
        g.fillText(it.sector, cx, cy);
      });
      g.restore();
  }};
  var ctx=document.getElementById('scatter').getContext('2d');
  scatterChart=new Chart(ctx,{ type:'bubble',
    data:{ datasets:[{ data:pts.map(function(p){return {x:p.x,y:p.y,r:p.r,sector:p.sector,w:p.w,n:p.n};}),
      backgroundColor:pts.map(function(p){ var c=diverge((p.x+p.y)/2,15); return c.replace('rgb(','rgba(').replace(')',',0.55)'); }),
      borderColor:'#475569', borderWidth:1 }] },
    options:{ maintainAspectRatio:false, animation:false,
      scales:{ x:{min:-xa,max:xa,title:{display:true,text:'RSI(1M) — 중기 상대강도 (%p)',color:'#111827',font:{size:13,weight:'600'}},ticks:{color:'#111827'},grid:{color:'#f1f5f9'}},
               y:{min:-ya,max:ya,title:{display:true,text:'1W — 단기 수익률 (%)',color:'#111827',font:{size:13,weight:'600'}},ticks:{color:'#111827'},grid:{color:'#f1f5f9'}} },
      plugins:{ legend:{display:false},
        tooltip:{ displayColors:false, callbacks:{ label:function(c){ var d=c.raw; return d.sector+' · 종목 '+d.n+' · 시총 '+Math.round(d.w).toLocaleString()+'억 · RSI '+(d.x>0?'+':'')+Math.round(d.x)+'%, 1W '+(d.y>0?'+':'')+Math.round(d.y)+'%'; } } } }
    }, plugins:[quad] });
}

// ── 2. 순위 변화 ──────────────────────────────────────────────────
function buildRanks(uh, ih, IDX1M){
  var note=document.getElementById('rkNote');
  if(!uh||!uh.stocks||!uh.dates){ note.textContent='universe_history.json 없음 — 순위 변화 계산 불가.'; return; }
  var uDates=uh.dates;
  var idxSeries={};
  if(ih&&ih.indices&&ih.dates){
    Object.keys(ih.indices).forEach(function(name){
      var arr=ih.indices[name], s=[];
      for(var i=0;i<ih.dates.length;i++){ if(arr[i]!==null&&arr[i]!==undefined) s.push([ih.dates[i],arr[i]]); }
      var pos={}; s.forEach(function(x,i){ pos[x[0]]=i; });
      idxSeries[name]={s:s,pos:pos};
    });
  }
  function idxRetAsOf(name,date,look){ var o=idxSeries[name]; if(!o) return null;
    var i=o.pos[date]; if(i===undefined){ for(var k=o.s.length-1;k>=0;k--){ if(o.s[k][0]<=date){ i=k; break; } } }
    if(i===undefined||i<look) return null; var a=o.s[i-look][1],b=o.s[i][1]; if(!a) return null; return (b/a-1)*100; }

  var recs=[];
  Object.keys(uh.stocks).forEach(function(tk){
    var arr=uh.stocks[tk], s=[];
    for(var i=0;i<uDates.length;i++){ if(arr[i]!==null&&arr[i]!==undefined) s.push([uDates[i],arr[i]]); }
    if(s.length<23) return;
    var li=s.length-1, yi=s.length-2;
    function ret(pos,look){ if(pos<look) return null; var a=s[pos-look][1],b=s[pos][1]; if(!a) return null; return (b/a-1)*100; }
    var meta=null; for(var j=0;j<STOCKS.length;j++){ if(STOCKS[j].tk===tk){ meta=STOCKS[j]; break; } }
    var name=meta?meta.disp:tk.split(':').pop(), sector=meta?meta.sector:'';
    var idxName=INDEX_BY_PREFIX[pfx(tk)];
    var w1_t=ret(li,5), w1_y=ret(yi,5);
    var sm_t=ret(li,21), sm_y=ret(yi,21);
    var im_t=idxName?idxRetAsOf(idxName,s[li][0],21):null;
    var im_y=idxName?idxRetAsOf(idxName,s[yi][0],21):null;
    var rsi_t=(sm_t!==null&&im_t!==null)?(sm_t-im_t):null;
    var rsi_y=(sm_y!==null&&im_y!==null)?(sm_y-im_y):null;
    recs.push({tk:tk,name:name,sector:sector,w1_t:w1_t,w1_y:w1_y,rsi_t:rsi_t,rsi_y:rsi_y});
  });

  function rankBy(ft, fy, tbodySel, exitSel){
    var today=recs.filter(function(r){return r[ft]!==null;}).slice().sort(function(a,b){return b[ft]-a[ft];});
    var yest =recs.filter(function(r){return r[fy]!==null;}).slice().sort(function(a,b){return b[fy]-a[fy];});
    var yrank={}; yest.forEach(function(r,i){ yrank[r.tk]=i+1; });
    var rows='';
    today.slice(0,40).forEach(function(r,i){
      var tr=i+1, yr=yrank[r.tk], dcell, cls;
      if(yr===undefined){ dcell='NEW'; cls='new'; }
      else { var d=yr-tr; if(d>0){dcell='▲'+d;cls='up';} else if(d<0){dcell='▼'+(-d);cls='down';} else {dcell='–';cls='flat';} }
      var isNewTop=(yr===undefined||yr>40), v=r[ft];
      rows+='<tr><td>'+tr+'</td><td class="'+cls+'">'+dcell+(isNewTop&&cls!=='new'?' <span class="new">↑</span>':'')
        +'</td><td class="l">'+r.name+'</td><td class="l">'+r.sector+'</td>'
        +'<td class="'+(v>0?'pos':v<0?'neg':'')+'">'+(v>0?'+':'')+Math.round(v)+'%</td></tr>';
    });
    document.querySelector(tbodySel).innerHTML=rows;
    var todayTop=today.slice(0,40).map(function(r){return r.tk;});
    var dropped=yest.slice(0,40).filter(function(r){ return todayTop.indexOf(r.tk)<0; });
    dropped.sort(function(a,b){ return yrank[a.tk]-yrank[b.tk]; });
    var eh;
    if(dropped.length){
      eh='<table class="exit-tbl"><thead><tr><th>전일 순위</th><th class="l">종목</th><th class="l">섹터</th></tr></thead><tbody>';
      dropped.forEach(function(r){ eh+='<tr><td>'+yrank[r.tk]+'위</td><td class="l">'+r.name+'</td><td class="l">'+r.sector+'</td></tr>'; });
      eh+='</tbody></table>';
    } else { eh='<div style="color:#9ca3af;padding:6px 2px;">이탈 없음</div>'; }
    document.querySelector(exitSel).innerHTML=eh;
  }
  rankBy('rsi_t','rsi_y','#rankRsi tbody','#exitRsi');
  rankBy('w1_t','w1_y','#rankW1 tbody','#exitW1');
  note.textContent='순위 산정 종목 '+recs.length+'개 (history 23거래일 이상) · 오늘='+uDates[uDates.length-1]+', 전일='+uDates[uDates.length-2];
}

// ── 다운로드 (PNG) ────────────────────────────────────────────────
function _stamp(){ var d=new Date(),p=function(n){return n<10?'0'+n:''+n;}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function _savePng(dataUrl, name){ var a=document.createElement('a'); a.href=dataUrl; a.download=name+'_'+_stamp()+'.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
function downloadHeatmap(){
  var node=document.getElementById('heatmap');
  if(typeof html2canvas!=='function'){ alert('이미지 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  html2canvas(node, {scale:2, backgroundColor:'#ffffff'}).then(function(cv){ _savePng(cv.toDataURL('image/png'), 'Universe_Heatmap_'+METRICS[METRIC].label.replace(/[()]/g,'')); });
}
function downloadScatter(){ if(!scatterChart){ alert('차트가 아직 준비되지 않았습니다.'); return; } _savePng(scatterChart.toBase64Image('image/png',1), 'Universe_SectorRotation'); }
function downloadRanks(){
  var node=document.getElementById('rankCapture');
  if(typeof html2canvas!=='function'){ alert('이미지 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  html2canvas(node, {scale:2, backgroundColor:'#ffffff'}).then(function(cv){ _savePng(cv.toDataURL('image/png'), 'Universe_Ranks'); });
}
