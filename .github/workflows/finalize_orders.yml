name: Finalize Pending Orders + AUM

on:
  schedule:
    - cron: '0 7 * * *'   # 16:00 KST = 07:00 UTC
  workflow_dispatch:

concurrency:
  group: wrap-nav-pipeline
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # KIS 자격증명 — calculate_wrap_nav(지수 확정치)·create_portfolio_tables(시총/시장구분)가 사용.
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for merge / merge-base

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Finalize pending orders → Wrap_NAV NEW sheet
        run: python execution/finalize_pending_orders.py
        env:
          TZ: 'Asia/Seoul'

      - name: Finalize pending AUM → Wrap_NAV AUM sheet
        run: python execution/finalize_pending_aum.py
        env:
          TZ: 'Asia/Seoul'

      - name: Calculate Wrap NAV (기준가)
        run: python calculate_wrap_nav.py || echo "calculate_wrap_nav 실패 (계속 진행)"
        env:
          TZ: 'Asia/Seoul'

      - name: Calculate Returns (수익률)
        run: python calculate_returns.py || echo "calculate_returns 실패 (계속 진행)"
        env:
          TZ: 'Asia/Seoul'

      - name: Regenerate portfolio_data.json
        run: python execution/create_portfolio_tables.py
        env:
          TZ: 'Asia/Seoul'

      - name: Regenerate Dashboard HTMLs
        run: python execution/create_dashboard.py
        env:
          TZ: 'Asia/Seoul'

      - name: Commit and push (race-safe)
        # --xlsx-conflict fail: a dropped commit would silently lose finalized
        # NEW/AUM edits, so fail loudly for a manual re-run instead.
        # portfolio_data.json kept as OURS (reflects freshly finalized orders).
        run: |
          bash scripts/safe_commit_push.sh \
            -m "Auto: finalize ORDER/AUM + Dashboard regenerate [skip ci]" \
            --xlsx-conflict fail \
            -- Wrap_NAV.xlsx orders/pending_orders.json orders/aum_pending.json portfolio_data.json index.html market.html wrap.html universe.html seibro.html featured.html hotels.html
