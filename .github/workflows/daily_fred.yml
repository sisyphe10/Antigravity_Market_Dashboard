name: Daily FRED US Macro Update

# 미국 FRED 시계열 36종 (금리/매크로/신용·부동산) → dataset.csv →
# market.html DATA 섹션 재생성. 화~토 07:50 KST (= UTC 월~금 22:50,
# 토요일 run이 금요일 밤 미국 고용보고서 등 발표를 다음날 아침 포착).
# secrets.FRED_API_KEY 미설정 시 graceful skip (실패 알림 없음).

on:
  workflow_dispatch:        # Allow manual trigger

concurrency:
  group: wrap-nav-pipeline
  cancel-in-progress: false

jobs:
  fetch-fred:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for merge / merge-base

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch FRED series (미국 금리/매크로/신용·부동산)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TZ: 'Asia/Seoul'
        run: |
          if [ -z "${FRED_API_KEY}" ]; then
            echo "FRED_API_KEY secret not set - skipping FRED fetch (no failure)"
            echo "FRED_SKIP=1" >> "$GITHUB_ENV"
            exit 0
          fi
          python execution/fetch_fred_data.py

      - name: Generate Dashboard
        if: env.FRED_SKIP != '1'
        run: |
          python execution/create_dashboard.py
        env:
          TZ: 'Asia/Seoul'

      - name: Commit and Push (race-safe)
        if: env.FRED_SKIP != '1'
        run: |
          bash scripts/safe_commit_push.sh \
            -m "Auto-update: FRED US macro series [skip ci]" \
            -- dataset.csv market.html
