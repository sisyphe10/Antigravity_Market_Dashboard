
name: Daily Market Crawl

on:
  schedule:
    - cron: '0 14 * * *'  # 11:00 PM KST (14:00 UTC)
  workflow_dispatch:      # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'execution/**'
      - 'dataset.csv'
      - 'requirements.txt'
      - '.github/workflows/daily_crawl.yml'

concurrency:
  group: wrap-nav-pipeline
  cancel-in-progress: false

jobs:
  crawl-and-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for merge / merge-base

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-nanum-coding fonts-noto-cjk
          fc-cache -fv

      - name: Backfill Historical Data (yfinance)
        run: |
          python execution/backfill_yfinance_history.py
        env:
          TZ: 'Asia/Seoul'

      - name: Fetch Monthly Returns (11 indices)
        run: |
          python execution/fetch_monthly_returns.py
        env:
          TZ: 'Asia/Seoul'

      - name: Fetch Index Returns (1M, for Universe RSI)
        run: |
          python execution/fetch_index_returns.py
        env:
          TZ: 'Asia/Seoul'

      - name: Import Memory Historical Data (Excel)
        run: |
          python execution/import_memory_data.py
        env:
          TZ: 'Asia/Seoul'

      - name: Run Crawler
        run: |
          python execution/market_crawler.py
        env:
          TZ: 'Asia/Seoul'

      - name: Calculate Wrap NAV
        run: |
          python calculate_wrap_nav.py
        env:
          TZ: 'Asia/Seoul'

      - name: Calculate Returns
        run: |
          python calculate_returns.py
        env:
          TZ: 'Asia/Seoul'

      - name: Fetch Danawa DRAM Retail Price (최저가)
        run: |
          python execution/fetch_danawa_price.py || echo "다나와 수집 실패 (계속 진행)"
        env:
           TZ: 'Asia/Seoul'

      - name: Draw Charts
        run: |
          rm -f charts/*.png
          python execution/draw_charts.py
        env:
           TZ: 'Asia/Seoul'

      - name: Fetch KRX Data (Gold + ETS)
        run: |
          python execution/fetch_krx_data.py || echo "KRX 데이터 수집 실패 (계속 진행)"
        env:
           TZ: 'Asia/Seoul'

      # 외국인 보유비중(코스피/코스닥 + 6종목 지분율). pykrx 로그인 방식 → KRX_ID/KRX_PW 시크릿 필요.
      # GHA IP에서 로그인 차단되면 VM(daily_krx_valuation 패턴)으로 이전.
      - name: Fetch KRX Foreign Ownership (코스피/코스닥 + 6종목)
        run: |
          python execution/fetch_krx_foreign.py || echo "외국인 보유비중 수집 실패 (계속 진행)"
        env:
           TZ: 'Asia/Seoul'
           KRX_ID: ${{ secrets.KRX_ID }}
           KRX_PW: ${{ secrets.KRX_PW }}

      - name: Fetch Deposit Data (고객예탁금 + 신용잔고)
        run: |
          python execution/fetch_deposit_data.py || echo "예탁금 수집 실패 (계속 진행)"
        env:
           TZ: 'Asia/Seoul'

      # Featured/stock_price_history는 VM 18:00 job에서 처리 (KRX OpenAPI가 GHA IP 차단)

      - name: Draw Wrap Charts
        run: |
          python execution/draw_wrap_charts.py
        env:
           TZ: 'Asia/Seoul'

      - name: Create Portfolio Tables
        run: |
          python execution/create_portfolio_tables.py
        env:
           TZ: 'Asia/Seoul'

      - name: Create Contribution Data (기여도 탭)
        run: |
          python execution/create_contribution_data.py || echo "기여도 데이터 생성 실패 (계속 진행)"
        env:
           TZ: 'Asia/Seoul'

      - name: Install Chrome (for SEIBro Selenium)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Fetch SEIBro TOP 50
        run: |
          python execution/fetch_seibro_data.py || echo "SEIBro 수집 실패 (계속 진행)"
        env:
          TZ: 'Asia/Seoul'

      # KODEX 200 섹터 데이터는 VM의 kodex-sectors.timer가 매일 23:30 KST에 생성·푸시.
      # KRX가 GHA Azure IP를 차단해서 VM(OCI)에서만 인증 로그인이 가능.

      - name: Generate Dashboard
        run: |
          python execution/create_dashboard.py
        env:
            TZ: 'Asia/Seoul'

      - name: Commit and Push (race-safe)
        # Nightly canonical rebuild → portfolio_data.json kept as OURS (newest).
        run: |
          bash scripts/safe_commit_push.sh \
            -m "Auto-update: Market data and dashboard [skip ci]" \
            --xlsx-conflict bail \
            -- dataset.csv charts/*.png index.html market.html wrap.html universe.html seibro.html featured.html featured_data.json portfolio_data.json Wrap_NAV.xlsx kodex_sectors.json seibro_tickers.json monthly_returns.json index_returns.json index_history.json
