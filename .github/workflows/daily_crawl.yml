
name: Daily Market Crawl

on:
  schedule:
    - cron: '0 14 * * *'  # 11:00 PM KST (14:00 UTC)
  workflow_dispatch:      # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'execution/**'
      - 'dataset.csv'
      - 'requirements.txt'
      - '.github/workflows/daily_crawl.yml'

jobs:
  crawl-and-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-nanum-coding
          fc-cache -fv

      - name: Backfill Historical Data (yfinance)
        run: |
          python execution/backfill_yfinance_history.py
        env:
          TZ: 'Asia/Seoul'

      - name: Import Memory Historical Data (Excel)
        run: |
          python execution/import_memory_data.py
        env:
          TZ: 'Asia/Seoul'

      - name: Run Crawler
        run: |
          python execution/market_crawler.py
        env:
          TZ: 'Asia/Seoul'

      - name: Calculate Wrap NAV
        run: |
          python calculate_wrap_nav.py
        env:
          TZ: 'Asia/Seoul'

      - name: Calculate Returns
        run: |
          python calculate_returns.py
        env:
          TZ: 'Asia/Seoul'

      - name: Draw Charts
        run: |
          rm -f charts/*.png
          python execution/draw_charts.py
        env:
           TZ: 'Asia/Seoul'

      - name: Fetch KRX Data (Gold + ETS)
        run: |
          python execution/fetch_krx_data.py || echo "KRX 데이터 수집 실패 (계속 진행)"
        env:
           TZ: 'Asia/Seoul'

      - name: Fetch Deposit Data (고객예탁금 + 신용잔고)
        run: |
          python execution/fetch_deposit_data.py || echo "예탁금 수집 실패 (계속 진행)"
        env:
           TZ: 'Asia/Seoul'

      - name: Restore Stock Price History Cache
        uses: actions/cache@v4
        with:
          path: stock_price_history.json
          key: stock-price-history-${{ github.run_id }}
          restore-keys: stock-price-history-

      - name: Update Stock Price History + Fetch Featured Data
        run: |
          pip install pykrx-openapi -q
          python execution/update_price_history.py || echo "가격 히스토리 업데이트 실패 (계속 진행)"
          python execution/fetch_featured_data.py || echo "Featured 수집 실패 (계속 진행)"
        env:
           TZ: 'Asia/Seoul'

      - name: Draw Wrap Charts
        run: |
          python execution/draw_wrap_charts.py
        env:
           TZ: 'Asia/Seoul'

      - name: Create Portfolio Tables
        run: |
          python execution/create_portfolio_tables.py
        env:
           TZ: 'Asia/Seoul'

      - name: Install Chrome (for SEIBro Selenium)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Fetch SEIBro TOP 50
        run: |
          python execution/fetch_seibro_data.py || echo "SEIBro 수집 실패 (계속 진행)"
        env:
          TZ: 'Asia/Seoul'

      - name: Fetch KODEX 200 Sector Data
        run: |
          python execution/fetch_kodex_sectors.py || echo "섹터 데이터 수집 실패 (대시보드는 계속 진행)"
        env:
           TZ: 'Asia/Seoul'

      - name: Generate Dashboard
        run: |
          python execution/create_dashboard.py
        env:
            TZ: 'Asia/Seoul'

      - name: Pull latest changes
        run: |
          git config pull.rebase true
          git pull --rebase --autostash || true
      
      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Market data and dashboard [skip ci]"
          file_pattern: 'dataset.csv charts/*.png index.html market.html wrap.html universe.html seibro.html featured.html featured_data.json portfolio_data.json Wrap_NAV.xlsx kodex_sectors.json seibro_tickers.json'
          skip_fetch: true
