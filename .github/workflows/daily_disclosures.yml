name: Daily Disclosures (DART + KIND)

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch DART disclosures (current holdings, accumulate)
        run: python execution/fetch_disclosures.py
        env:
          TZ: 'Asia/Seoul'
          DART_API_KEY: ${{ secrets.DART_API_KEY }}

      - name: Fetch KIND exchange disclosures (current holdings, accumulate)
        run: python execution/fetch_kind_disclosures.py
        env:
          TZ: 'Asia/Seoul'

      - name: Commit and push (disclosures.json + corp_codes.json)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: DART + KIND disclosures update [skip ci]"
          file_pattern: 'disclosures.json corp_codes.json'
          skip_fetch: true
