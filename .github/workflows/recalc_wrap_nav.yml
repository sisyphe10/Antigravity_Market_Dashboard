name: Recalculate Wrap NAV

on:
  push:
    branches:
      - main
    paths:
      - 'Wrap_NAV.xlsx'
  workflow_dispatch:

# Serialize every workflow that writes Wrap_NAV.xlsx + dashboards so no two GHA
# runs touch the binary at once (makes the xlsx guard in safe_commit_push.sh
# only ever fire on a manual/user xlsx push). cancel-in-progress:false queues.
concurrency:
  group: wrap-nav-pipeline
  cancel-in-progress: false

jobs:
  recalc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # KIS 자격증명 — calculate_wrap_nav(지수 확정치)·create_portfolio_tables(시총/시장구분)가 사용.
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for merge / merge-base

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Calculate Wrap NAV
        run: python calculate_wrap_nav.py
        env:
          TZ: 'Asia/Seoul'

      - name: Calculate Returns
        run: python calculate_returns.py
        env:
          TZ: 'Asia/Seoul'

      - name: Regenerate portfolio_data.json
        run: python execution/create_portfolio_tables.py
        env:
          TZ: 'Asia/Seoul'
          PYTHONIOENCODING: 'utf-8'

      - name: Regenerate dashboards
        run: python execution/create_dashboard.py
        env:
          TZ: 'Asia/Seoul'
          PYTHONIOENCODING: 'utf-8'

      - name: Commit and Push (race-safe)
        run: |
          bash scripts/safe_commit_push.sh \
            -m "auto: Wrap_NAV 재계산 + 대시보드 재생성 [skip ci]" \
            --xlsx-conflict bail --prefer-remote-portfolio \
            -- Wrap_NAV.xlsx portfolio_data.json wrap.html market.html index.html universe.html seibro.html featured.html hotels.html
