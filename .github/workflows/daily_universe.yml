name: Daily Universe (yfinance)

on:
  schedule:
    - cron: '30 7 * * *'   # 16:30 KST (07:30 UTC) — 한국 장종료 후
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Universe data (yfinance)
        run: python execution/fetch_universe.py
        env:
          TZ: 'Asia/Seoul'

      - name: Commit and push (universe.json)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Universe data update [skip ci]"
          file_pattern: 'universe.json'
          skip_fetch: true
