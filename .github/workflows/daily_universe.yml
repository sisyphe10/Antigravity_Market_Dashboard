name: Daily Universe (yfinance)

on:
  schedule:
    # 아시아 장종료 후 (한국 15:30 / 일본 15:00 / 대만 14:30 / 홍콩 17:00 KST)
    - cron: '30 9 * * *'   # 18:30 KST (09:30 UTC)
    # 미국·유럽·캐나다 장종료 후 (NYSE 05~06 KST 다음날 / STOXX 01:30 / TSX 동일)
    - cron: '0 22 * * *'   # 07:00 KST (22:00 UTC)
  workflow_dispatch:

# 다른 daily 워크플로(recalc/finalize/daily_crawl 등)와 같은 그룹 → GHA끼리 push 직렬화.
concurrency:
  group: wrap-nav-pipeline
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # safe_commit_push의 merge/merge-base에 전체 이력 필요

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Universe data (yfinance)
        run: python execution/fetch_universe.py
        env:
          TZ: 'Asia/Seoul'

      - name: Commit and push (race-safe)
        # naive git-auto-commit-action(non-fast-forward 시 실패)을 제거하고
        # 레포 공용 safe_commit_push.sh로 교체 — fetch+whole-file merge+재시도로
        # GHA/VM 동시 push 레이스를 자가복구. universe.json은 xlsx 무관(드물게
        # 동시 xlsx push 시엔 이 run 커밋을 드롭하고 다음 run서 복구).
        run: |
          bash scripts/safe_commit_push.sh \
            -m "Auto: Universe data update [skip ci]" \
            -- universe.json universe_history.json
