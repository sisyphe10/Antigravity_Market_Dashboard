name: Daily Universe (yfinance)

on:
  schedule:
    # 아시아 장종료 후 (한국 15:30 / 일본 15:00 / 대만 14:30 / 홍콩 17:00 KST)
    - cron: '30 9 * * *'   # 18:30 KST (09:30 UTC)
    # 미국·유럽·캐나다 장종료 후 (NYSE 05~06 KST 다음날 / STOXX 01:30 / TSX 동일)
    - cron: '0 22 * * *'   # 07:00 KST (22:00 UTC)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Universe data (yfinance)
        run: python execution/fetch_universe.py
        env:
          TZ: 'Asia/Seoul'

      - name: Commit and push (universe.json)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Universe data update [skip ci]"
          file_pattern: 'universe.json'
          skip_fetch: true
