name: Daily KRX Index Valuation

# 코스피/코스닥 지수 후행 PER/PBR/배당수익률 (pykrx data.krx 로그인) → dataset.csv →
# market.html DATA 섹션(INDEX_KOREA) 재생성. 평일 18:30 KST (장 마감 후 KRX 저녁 발표 반영).
# secrets KRX_ID/KRX_PW 미설정 시 graceful skip (실패 알림 없음).
# ECOS/KOFIA와 동일 concurrency 그룹으로 dataset.csv 쓰기 직렬화.

on:
  workflow_dispatch:        # Allow manual trigger

concurrency:
  group: wrap-nav-pipeline
  cancel-in-progress: false

jobs:
  fetch-krx-valuation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for merge / merge-base

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch KRX index valuation (코스피/코스닥 PER·PBR·배당수익률)
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          TZ: 'Asia/Seoul'
        run: |
          if [ -z "${KRX_ID}" ] || [ -z "${KRX_PW}" ]; then
            echo "KRX_ID/KRX_PW secret not set - skipping (no failure)"
            echo "KRX_SKIP=1" >> "$GITHUB_ENV"
            exit 0
          fi
          python execution/fetch_krx_valuation.py

      - name: Generate Dashboard
        if: env.KRX_SKIP != '1'
        run: |
          python execution/create_dashboard.py
        env:
          TZ: 'Asia/Seoul'

      - name: Commit and Push (race-safe)
        if: env.KRX_SKIP != '1'
        run: |
          bash scripts/safe_commit_push.sh \
            -m "Auto-update: KRX index valuation [skip ci]" \
            -- dataset.csv market.html
